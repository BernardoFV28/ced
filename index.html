<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOMNARA</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  body{display:flex;align-items:center;justify-content:center;background:#000}
  #game-container{display:flex;align-items:center;justify-content:center}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
  #boot-screen{
    position:fixed;inset:0;background:#000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:999;
    font-family:'Courier New',monospace;color:#4a3a8a;
  }
  #boot-screen h1{
    font-size:clamp(18px,3vw,28px);letter-spacing:10px;margin-bottom:16px;
    text-shadow:0 0 20px #4a3a8a,0 0 40px #221a44;
    animation:flicker 3s infinite;
  }
  #boot-screen .sub{font-size:10px;color:#333;letter-spacing:4px;margin-bottom:30px}
  #boot-progress{width:200px;height:2px;background:#111;position:relative;overflow:hidden}

  #touch-controls{
    position:fixed; inset:0; z-index:500; pointer-events:none;
    display:none; font-family:'Courier New',monospace; user-select:none;
    -webkit-user-select:none; touch-action:none;
  }
  body.is-touch #touch-controls{ display:block; }
  .tc-btn{
    position:absolute; pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
    background:rgba(20,15,25,0.55); border:1px solid rgba(139,26,26,0.6);
    color:#c8a87a; border-radius:50%; font-size:13px; font-weight:bold;

    box-shadow:0 0 10px rgba(0,0,0,0.5);

  .tc-btn.active{ background:rgba(139,26,26,0.5); border-color:#ff6020; color:#eaf4ff; }
  .tc-dpad{ width:54px; height:54px; bottom:24px; }
  #tc-left{ left:14px; }
  #tc-right{ left:78px; }
  #tc-jump{ left:46px; bottom:88px; width:54px; height:54px; }
  .tc-action{ width:50px; height:50px; bottom:24px; font-size:11px; }
  #tc-attack{ right:14px; bottom:78px; background:rgba(139,26,26,0.45); }
  #tc-dash{ right:78px; bottom:24px; background:rgba(60,80,180,0.4); }
  #tc-parry{ right:78px; bottom:90px; background:rgba(80,120,200,0.4); }
  #tc-pause{
    top:6px; right:6px; width:26px; height:26px; font-size:11px;
    border-radius:4px; background:rgba(20,15,25,0.5);
  }
</style>
</head>
<body>
<div id="boot-screen">
  <h1>SOMNARA</h1>
  <div class="sub">ONDE OS SONHOS GUARDAM O QUE VOCÊ NÃO CONSEGUE CARREGAR ACORDADO</div>
  <div id="boot-progress"><div id="boot-bar"></div></div>
  <div id="boot-text">inicializando...</div>
</div>
<div id="game-container"></div>
<div id="touch-controls">
  <div class="tc-btn tc-dpad" id="tc-left">◄</div>
  <div class="tc-btn tc-dpad" id="tc-right">►</div>
  <div class="tc-btn" id="tc-jump">▲</div>
  <div class="tc-btn tc-action" id="tc-attack">ATK</div>
  <div class="tc-btn tc-action" id="tc-parry">PAR</div>
  <div class="tc-btn tc-action" id="tc-dash">DSH</div>
  <div class="tc-btn" id="tc-pause">II</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.70.0/phaser.min.js"></script>
<script>
'use strict';

// ════════════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════════════════════
const W = 480, H = 270, SCALE = Math.min(Math.floor(window.innerWidth/W), Math.floor(window.innerHeight/H), 3) || 2;
const GRAVITY = 850, SPD = 155, JUMP = -400;
const DASH_SPD = 480, DASH_DUR = 140, DASH_CD = 580, IFRAME_DUR = 300;
const PARRY_WIN = 190, PARRY_CD = 800;
const BASE_DMG = 22, PLAYER_MAX_HP = 100;
const CRIT_CHANCE = 0.12, CRIT_MULT = 1.8;
const ATTACK_DUR = 210, COMBO_WIN = 380;
const STAMINA_MAX = 100, STAMINA_REGEN = 18, DASH_STAMINA = 30, PARRY_STAMINA = 20;

// ════════════════════════════════════════════════════════════════════════════
//  SYNTHETIC SOUND ENGINE (AudioContext — no assets needed)
// ════════════════════════════════════════════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  function play(type) {
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      const t = c.currentTime;
      if (type === 'hit') {
        o.type = 'sawtooth'; o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(60, t + 0.08);
        g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        o.start(t); o.stop(t + 0.1);
      } else if (type === 'crit') {
        o.type = 'square'; o.frequency.setValueAtTime(320, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.15);
        g.gain.setValueAtTime(0.22, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        o.start(t); o.stop(t + 0.18);
      } else if (type === 'dash') {
        o.type = 'sine'; o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(200, t + 0.12);
        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        o.start(t); o.stop(t + 0.12);
      } else if (type === 'parry') {
        o.type = 'sine'; o.frequency.setValueAtTime(900, t); o.frequency.setValueAtTime(1200, t + 0.03); o.frequency.exponentialRampToValueAtTime(400, t + 0.2);
        g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        o.start(t); o.stop(t + 0.22);
      } else if (type === 'pickup') {
        o.type = 'sine'; o.frequency.setValueAtTime(500, t); o.frequency.exponentialRampToValueAtTime(900, t + 0.08);
        g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        o.start(t); o.stop(t + 0.1);
      } else if (type === 'death') {
        o.type = 'sawtooth'; o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.6);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        o.start(t); o.stop(t + 0.6);
      } else if (type === 'relic') {
        o.type = 'sine'; o.frequency.setValueAtTime(440, t); o.frequency.setValueAtTime(554, t+0.1); o.frequency.setValueAtTime(660, t+0.2);
        g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        o.start(t); o.stop(t + 0.4);
      }
    } catch(e) {}
  }
  return { play };
})();

// ════════════════════════════════════════════════════════════════════════════
//  TOUCH INPUT (virtual buttons)
// ════════════════════════════════════════════════════════════════════════════
const Touch = { left:false, right:false, jump:false, attack:false, parry:false, dash:false, pause:false };
(function setupTouch() {
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (!isTouch) return;
  document.body.classList.add('is-touch');

  function bind(id, key, isPause, isPress) {
    const el = document.getElementById(id);
    if (!el) return;
    const press = (e) => {
      e.preventDefault();
      el.classList.add('active');
      Touch[key] = true;
      if (isPress) Touch[key + '_just'] = true;
    };
    const release = (e) => {
      e.preventDefault();
      el.classList.remove('active');
      Touch[key] = false;
    };
    el.addEventListener('touchstart', press, { passive:false });
    el.addEventListener('touchend', release, { passive:false });
    el.addEventListener('touchcancel', release, { passive:false });
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', release);
    el.addEventListener('mouseleave', release);
  }
  bind('tc-left', 'left');
  bind('tc-right', 'right');
  bind('tc-jump', 'jump');
  bind('tc-attack', 'attack', false, true);
  bind('tc-parry', 'parry', false, true);
  bind('tc-dash', 'dash', false, true);
  bind('tc-pause', 'pause', false, true);
})();


function mulberry32(seed) {
  return () => {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ════════════════════════════════════════════════════════════════════════════
//  EVENT BUS
// ════════════════════════════════════════════════════════════════════════════
const Bus = new Phaser.Events.EventEmitter();
const EV = {
  HIT:'p:hit', DEATH:'p:death', HEAL:'p:heal',
  PARRY:'p:parry', ENEMY_DEATH:'e:death', SCRAP:'scrap',
  ROOM_CLEAR:'room:clear', BOSS_PHASE:'boss:phase',
};

// ════════════════════════════════════════════════════════════════════════════
//  RUN STATE
// ════════════════════════════════════════════════════════════════════════════
const Run = {
  hp: PLAYER_MAX_HP, maxHp: PLAYER_MAX_HP, scrap: 0, relics: [],
  kills: 0, roomsCleared: 0, depth: 0,
  stamina: STAMINA_MAX, maxStamina: STAMINA_MAX,
  combo: 0, comboExpiry: 0,
  roomHistory: [], // minimap
  buffs: {}, // dmgMult, parryBonus, noHeal, deathExplode
  reset() {
    this.hp = PLAYER_MAX_HP; this.maxHp = PLAYER_MAX_HP;
    this.scrap = 0; this.relics = []; this.kills = 0;
    this.roomsCleared = 0; this.depth = 0; this.buffs = {};
    this.stamina = STAMINA_MAX; this.maxStamina = STAMINA_MAX;
    this.combo = 0; this.comboExpiry = 0; this.roomHistory = [];
  },
  hurt(n, srcX) {
    if (this.buffs.noHeal && n < 0) return;
    this.hp = Math.max(0, this.hp - n);
    Bus.emit(EV.HIT, { hp: this.hp, srcX });
    if (this.hp <= 0) Bus.emit(EV.DEATH);
  },
  heal(n) {
    if (this.buffs.noHeal) return;
    this.hp = Math.min(this.maxHp, this.hp + n);
    Bus.emit(EV.HEAL, { hp: this.hp });
  },
  addScrap(n) { this.scrap += n; Bus.emit(EV.SCRAP, this.scrap); },
  dmg() { return BASE_DMG * (this.buffs.dmgMult || 1); },
  parryWindow() { return PARRY_WIN + (this.buffs.parryBonus || 0); },
  useStamina(n) {
    // Shadow Mantle relic: 50% stamina cost reduction
    const cost = Run.relics.find(r => r.id === 'shadow_mantle') ? Math.floor(n * 0.5) : n;
    if (this.stamina < cost) return false;
    this.stamina = Math.max(0, this.stamina - cost);
    Bus.emit('stamina:change', this.stamina);
    return true;
  },
  regenStamina(delta) {
    const prev = this.stamina;
    this.stamina = Math.min(this.maxStamina, this.stamina + STAMINA_REGEN * delta / 1000);
    if (Math.floor(prev) !== Math.floor(this.stamina)) Bus.emit('stamina:change', this.stamina);
  },
  addComboHit() {
    this.combo++;
    this.comboExpiry = Date.now() + COMBO_WIN + 200;
    Bus.emit('combo:hit', this.combo);
  },
  resetCombo() { this.combo = 0; Bus.emit('combo:hit', 0); },
};

// ════════════════════════════════════════════════════════════════════════════
//  PERMANENT STATE
// ════════════════════════════════════════════════════════════════════════════
const Perm = {
  echos: 0, totalRuns: 0, bestDepth: 0,
  upgrades: { voz: 0, memoria: 0, vinculo: 0, despertar: 0 }, // árvore de habilidades (Tecedor)
  load() {
    try { const d = localStorage.getItem('cd_v2'); if (d) Object.assign(this, JSON.parse(d)); } catch(e) {}
    if (!this.upgrades) this.upgrades = { voz: 0, memoria: 0, vinculo: 0, despertar: 0 };
    // Migração de saves antigos
    if ('maxHp' in this.upgrades || 'dmg' in this.upgrades || 'stamina' in this.upgrades) {
      this.upgrades = {
        voz: this.upgrades.dmg || 0,
        memoria: this.upgrades.stamina || 0,
        vinculo: this.upgrades.maxHp || 0,
        despertar: 0,
      };
    }
    for (const k of ['voz','memoria','vinculo','despertar']) if (!(k in this.upgrades)) this.upgrades[k] = 0;
  },
  save() {
    try { localStorage.setItem('cd_v2', JSON.stringify({ echos:this.echos, totalRuns:this.totalRuns, bestDepth:this.bestDepth, upgrades:this.upgrades })); } catch(e) {}
  },
};

// ════════════════════════════════════════════════════════════════════════════
//  TEXTURE FACTORY — ALL PIXEL ART IS PROCEDURAL (Dark Souls × Blasphemous)
// ════════════════════════════════════════════════════════════════════════════
function mkTex(scene, key, w, h, fn) {
  if (scene.textures.exists(key)) return;
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d'); ctx.imageSmoothingEnabled = false;
  fn(ctx, w, h);
  scene.textures.addCanvas(key, c);
}

function buildTextures(scene) {
  // ── PALETTE ────────────────────────────────────────────────────────────
  const P = {
    black:'#000000', darkest:'#080810', dark:'#0e0e18',
    stone:'#1a1922', stone2:'#232334', mid:'#2e2d42',
    flesh:'#c8a87a', flesh2:'#b89060', flesh3:'#9a7050',
    blood:'#4a3a8a', blood2:'#7a5ad8', blood3:'#b8a0ff',
    gold:'#c8a030', gold2:'#e0b840', rust:'#6b3a1a',
    blade:'#aab8cc', blade2:'#c8d8e8', blade3:'#e8f0ff',
    ember:'#5ab0ff', ember2:'#aee0ff', holy:'#eaf4ff',
    shadow:'rgba(0,0,0,0.6)', mist:'rgba(20,20,40,0.4)',
  };

  // ── PLAYER IDLE ─────────────────────────────────────────────────────────
  // Penitent pilgrim in tattered robes with conical hat (Blasphemous-style)
  mkTex(scene, 'player_idle', 14, 26, (ctx) => {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillEllipse ? null : null;
    // Robe body — tattered dark cloth
    ctx.fillStyle = '#1a1520'; ctx.fillRect(3,10,8,14);
    ctx.fillStyle = '#14101a'; ctx.fillRect(4,10,6,13);
    // Tattered hem
    ctx.fillStyle = '#0e0c12';
    for(let i=0;i<4;i++) ctx.fillRect(3+i*2, 22+((i%2)*2), 2, 2);
    // Arms
    ctx.fillStyle = '#1a1520'; ctx.fillRect(1,11,3,7); ctx.fillRect(10,11,3,7);
    // Gauntlet hands
    ctx.fillStyle = '#6b3a1a'; ctx.fillRect(1,17,3,2); ctx.fillRect(10,17,3,2);
    // Neck/torso clasp
    ctx.fillStyle = '#4a3a8a'; ctx.fillRect(5,10,4,2);
    ctx.fillStyle = '#c8a030'; ctx.fillRect(6,10,2,1);
    // Head — wrapped in cloth, Blasphemous penitent style
    ctx.fillStyle = '#c8a87a'; ctx.fillRect(4,3,6,7);
    // Cloth wrap
    ctx.fillStyle = '#1a1520'; ctx.fillRect(3,3,8,3); ctx.fillRect(3,8,1,2); ctx.fillRect(10,8,1,2);
    // Eyes — hollow/glowing
    ctx.fillStyle = '#9ad8ff'; ctx.fillRect(5,5,2,1); ctx.fillRect(8,5,2,1);
    // Conical hat — the penitent crown
    ctx.fillStyle = '#0e0c12';
    for(let i=0;i<5;i++) ctx.fillRect(3+i, 2-i, Math.max(1,6-i*2+1), 1);
    ctx.fillRect(6,0,2,1);
    // Hat brim
    ctx.fillStyle = '#1a1520'; ctx.fillRect(2,4,10,1);
    // Sword at hip
    ctx.fillStyle = '#aab8cc'; ctx.fillRect(11,13,1,8);
    ctx.fillStyle = '#c8a030'; ctx.fillRect(10,14,3,1);
    ctx.fillStyle = '#6b3a1a'; ctx.fillRect(11,13,1,1);
  });

  // ── PLAYER RUN 1-3 ─────────────────────────────────────────────────────
  [['player_run1',2,0,0],['player_run2',0,1,-1],['player_run3',-1,0,1]].forEach(([key,lx,ry,rx],fi) => {
    mkTex(scene, key, 14, 26, (ctx) => {
      ctx.fillStyle = '#1a1520'; ctx.fillRect(3,10,8,13);
      ctx.fillStyle = '#14101a'; ctx.fillRect(4,10,6,12);
      // Running legs
      if(fi===0){ ctx.fillStyle='#0e0c12'; ctx.fillRect(4,21,3,3); ctx.fillRect(7,22,3,3); }
      else if(fi===1){ ctx.fillStyle='#0e0c12'; ctx.fillRect(3,20,3,4); ctx.fillRect(8,21,3,3); }
      else { ctx.fillStyle='#0e0c12'; ctx.fillRect(5,20,3,5); ctx.fillRect(6,23,3,2); }
      ctx.fillStyle = '#1a1520'; ctx.fillRect(1+lx,11,3,7); ctx.fillRect(10,11+ry,3,7);
      ctx.fillStyle = '#6b3a1a'; ctx.fillRect(1+lx,17,3,2); ctx.fillRect(10,16+ry,3,2);
      ctx.fillStyle = '#4a3a8a'; ctx.fillRect(5,10,4,2);
      ctx.fillStyle = '#c8a030'; ctx.fillRect(6,10,2,1);
      ctx.fillStyle = '#c8a87a'; ctx.fillRect(4,3,6,7);
      ctx.fillStyle = '#1a1520'; ctx.fillRect(3,3,8,3);
      ctx.fillStyle = '#9ad8ff'; ctx.fillRect(5,5,2,1); ctx.fillRect(8,5,2,1);
      ctx.fillStyle = '#0e0c12';
      for(let i=0;i<5;i++) ctx.fillRect(3+i, 2-i, Math.max(1,6-i*2+1), 1);
      ctx.fillRect(6,0,2,1);
      ctx.fillStyle = '#1a1520'; ctx.fillRect(2,4,10,1);
      // Sword
      ctx.fillStyle = '#aab8cc'; ctx.fillRect(11,13+rx,1,8);
      ctx.fillStyle = '#c8a030'; ctx.fillRect(10,14+rx,3,1);
    });
  });

  // ── PLAYER ATTACK frames ────────────────────────────────────────────────
  mkTex(scene, 'player_atk1', 20, 26, (ctx) => {
    // Body leaning forward
    ctx.fillStyle = '#1a1520'; ctx.fillRect(4,10,8,13);
    ctx.fillStyle = '#14101a'; ctx.fillRect(5,10,6,12);
    ctx.fillStyle = '#0e0c12'; for(let i=0;i<4;i++) ctx.fillRect(4+i*2,21+(i%2*2),2,2);
    // Attack arm extended
    ctx.fillStyle = '#1a1520'; ctx.fillRect(1,11,3,6);
    ctx.fillStyle = '#1a1520'; ctx.fillRect(12,10,3,5);
    ctx.fillStyle = '#6b3a1a'; ctx.fillRect(1,16,3,2);
    ctx.fillStyle = '#4a3a8a'; ctx.fillRect(5,10,4,2);
    ctx.fillStyle = '#c8a030'; ctx.fillRect(6,10,2,1);
    ctx.fillStyle = '#c8a87a'; ctx.fillRect(4,3,6,7);
    ctx.fillStyle = '#1a1520'; ctx.fillRect(3,3,8,3);
    ctx.fillStyle = '#9ad8ff'; ctx.fillRect(5,5,2,1); ctx.fillRect(8,5,2,1);
    ctx.fillStyle = '#0e0c12'; for(let i=0;i<5;i++) ctx.fillRect(3+i,2-i,Math.max(1,6-i*2+1),1);
    ctx.fillStyle = '#1a1520'; ctx.fillRect(2,4,10,1);
    // Sword extended — slash arc
    ctx.fillStyle = '#c8d8e8'; ctx.fillRect(14,8,4,1);
    ctx.fillStyle = '#aab8cc'; ctx.fillRect(12,9,4,1); ctx.fillRect(13,10,4,1);
    ctx.fillStyle = '#c8a030'; ctx.fillRect(12,10,2,1);
    // Slash effect
    ctx.fillStyle = 'rgba(200,220,255,0.5)'; ctx.fillRect(15,6,3,5);
  });

  mkTex(scene, 'player_atk2', 22, 26, (ctx) => {
    ctx.fillStyle = '#1a1520'; ctx.fillRect(4,10,8,13);
    ctx.fillStyle = '#14101a'; ctx.fillRect(5,10,6,12);
    ctx.fillStyle = '#0e0c12'; for(let i=0;i<4;i++) ctx.fillRect(4+i*2,21+(i%2*2),2,2);
    ctx.fillStyle = '#1a1520'; ctx.fillRect(1,11,3,6);
    ctx.fillStyle = '#4a3a8a'; ctx.fillRect(5,10,4,2);
    ctx.fillStyle = '#c8a030'; ctx.fillRect(6,10,2,1);
    ctx.fillStyle = '#c8a87a'; ctx.fillRect(4,3,6,7);
    ctx.fillStyle = '#1a1520'; ctx.fillRect(3,3,8,3);
    ctx.fillStyle = '#9ad8ff'; ctx.fillRect(5,5,2,1); ctx.fillRect(8,5,2,1);
    ctx.fillStyle = '#0e0c12'; for(let i=0;i<5;i++) ctx.fillRect(3+i,2-i,Math.max(1,6-i*2+1),1);
    ctx.fillStyle = '#1a1520'; ctx.fillRect(2,4,10,1);
    // Overhead smash
    ctx.fillStyle = '#e8f0ff'; ctx.fillRect(12,4,2,8); ctx.fillRect(13,3,2,10);
