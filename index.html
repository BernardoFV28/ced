// ============================================================================
//  SCENE — INTRO  (Narrativa de abertura de Somnara)
// ============================================================================
class IntroScene extends Phaser.Scene {
  constructor() { super('Intro'); }

  create() {
    this.cameras.main.setBackgroundColor('#000000');
    this._slides = this._buildSlides();
    this._idx = 0;
    this._busy = false;
    this._eloTargetX = W * 0.5;
    this._eloTargetY = H * 0.5;
    this._eloT = 0;

    // Fundo gradiente violeta noturno
    const gfx = this.add.graphics();
    for (let y = 0; y < H; y += 2) {
      const t = y / H;
      gfx.fillStyle(Phaser.Display.Color.GetColor(
        Math.round(2 + t * 6), Math.round(1 + t * 3), Math.round(8 + t * 22)));
      gfx.fillRect(0, y, W, 2);
    }
    // Estrelas
    for (let i = 0; i < 60; i++) {
      const sx = Math.random() * W, sy = Math.random() * H;
      gfx.fillStyle(0xeaf4ff, 0.15 + Math.random() * 0.5);
      gfx.fillRect(Math.round(sx), Math.round(sy), 1, 1);
    }
    // Silhuetas de arvores invertidas
    const tg = this.add.graphics();
    tg.fillStyle(0x050210, 0.8);
    [[30,H,20,60],[80,H,14,40],[W-40,H,18,55],[W-90,H,12,35],[W/2-60,H,16,45]].forEach(([x,y,w,h]) => {
      tg.fillRect(x, y - h, w, h);
      tg.fillTriangle(x - w*0.5, y - h, x + w*1.5, y - h, x + w*0.5, y - h - 20);
    });

    // Caixas de texto
    this._titleBox = this.add.text(W / 2, H * 0.28, '', {
      fontFamily: 'monospace', fontSize: '10px', color: '#eaf4ff',
      align: 'center', letterSpacing: 4,
    }).setOrigin(0.5).setAlpha(0);

    this._textBox = this.add.text(W / 2, H * 0.50, '', {
      fontFamily: 'monospace', fontSize: '7px', color: '#c8d8ff',
      align: 'center', wordWrap: { width: W - 60 }, lineSpacing: 5,
    }).setOrigin(0.5).setAlpha(0);

    this._subBox = this.add.text(W / 2, H * 0.74, '', {
      fontFamily: 'monospace', fontSize: '5px', color: '#6070a0',
      align: 'center', wordWrap: { width: W - 80 }, lineSpacing: 4,
    }).setOrigin(0.5).setAlpha(0);

    // Elo — ser de luz
    this._elo = this.add.graphics();

    // Hint
    this.add.text(W - 8, H - 8,
      '[ ENTER ]  avancar    [ ESC ]  pular', {
      fontFamily: 'monospace', fontSize: '4px', color: '#151525',
    }).setOrigin(1, 1);

    this._slideCounter = this.add.text(8, H - 8, '', {
      fontFamily: 'monospace', fontSize: '4px', color: '#151525',
    }).setOrigin(0, 1);

    // Input
    this.input.keyboard.on('keydown-ENTER', () => this._advance());
    this.input.keyboard.on('keydown-SPACE', () => this._advance());
    this.input.keyboard.on('keydown-Z',     () => this._advance());
    this.input.keyboard.on('keydown-ESC',   () => this._skip());
    this.input.on('pointerdown',            () => this._advance());

    // Anima Elo
    this.time.addEvent({ delay: 50, loop: true, callback: () => this._animElo() });

    this.cameras.main.fadeIn(600, 0, 0, 0);
    this.time.delayedCall(400, () => this._showSlide(0));
  }

  _buildSlides() {
    return [
      {
        title: '',
        body:  '"Tem uma coisa que ninguem te conta sobre ser invisivel."',
        sub:   '"Voce comeca a acreditar que e verdade."',
        eloX: W * 0.72, eloY: H * 0.30,
      },
      {
        title: '',
        body:  'Ele andava pelos corredores colado na parede.\nAlmocava sozinho na ultima mesa.\nOlhava pela janela pro patio cheio de gente\nque nao enxergava ele.',
        sub:   'Em casa nao era diferente.\nEle aprendeu a encolher. Aprendeu a nao fazer barulho.',
        eloX: W * 0.18, eloY: H * 0.42,
      },
      {
        title: '',
        body:  'A noite, fechava os olhos com forca\ncomo se pudesse espremer o dia todo\npra fora da cabeca.',
        sub:   'E entao comecou a funcionar.',
        eloX: W * 0.80, eloY: H * 0.28,
      },
      {
        title: 'A PRIMEIRA QUEDA',
        body:  'Nao foi um sonho bonito.\nNao foi nuvens e luz.\n\nFoi uma queda.',
        sub:   'O chao chegou devagar\ncomo se o mundo tivesse decidido pega-lo com cuidado.',
        eloX: W * 0.50, eloY: H * 0.62,
      },
      {
        title: 'S  O  M  N  A  R  A',
        body:  'O ceu era violeta e sangrava estrelas lentas.\nAs arvores cresciam de cabeca pra baixo.\nO ar cheirava a lembranca de um dia\nque talvez nunca existiu.',
        sub:   'Ninguem gritou com ele aqui. Ninguem riu.\nO lugar simplesmente... esperava.',
        eloX: W * 0.50, eloY: H * 0.22,
      },
      {
        title: 'E  L  O',
        body:  'Havia um ser pequeno, feito inteiramente de luz fraca.\n\nNao tem genero, nao tem idade,\nnao tem historia propria.',
        sub:   'Nao resolve. Nao salva. So fica perto.\n\nAs vezes e o suficiente.',
        eloX: W * 0.50, eloY: H * 0.46,
      },
      {
        title: '',
        body:  'Somnara estava tentando dizer alguma coisa\nem silencio, com cada arvore invertida\ne cada rio que sobe.',
        sub:   '"Voce veio pra se esconder\nou pra se encontrar?"',
        eloX: W * 0.50, eloY: H * 0.50,
      },
    ];
  }

  _showSlide(idx) {
    if (idx >= this._slides.length) { this._skip(); return; }
    this._busy = true;
    const s = this._slides[idx];
    this._eloTargetX = s.eloX;
    this._eloTargetY = s.eloY;
    this._slideCounter.setText(`${idx + 1} / ${this._slides.length}`);

    const targets = [this._titleBox, this._textBox, this._subBox];
    this.tweens.add({
      targets, alpha: 0, duration: 280,
      onComplete: () => {
        this._titleBox.setText(s.title || '');
        this._textBox.setText(s.body || '');
        this._subBox.setText(s.sub || '');
        const hasTitle = !!s.title;
        this._titleBox.setY(hasTitle ? H * 0.28 : -50);
        this._textBox.setY(hasTitle ? H * 0.50 : H * 0.43);
        this._subBox.setY(hasTitle ? H * 0.74 : H * 0.70);
        this.tweens.add({
          targets, alpha: 1, duration: 500,
          onComplete: () => { this._busy = false; }
        });
      }
    });
  }

  _advance() {
    if (this._busy) {
      this.tweens.killAll();
      [this._titleBox, this._textBox, this._subBox].forEach(t => t.setAlpha(1));
      this._busy = false;
      return;
    }
    this._idx++;
    this._showSlide(this._idx);
  }

  _skip() {
    this.tweens.killAll();
    this.cameras.main.fade(500, 0, 0, 0);
    this.time.delayedCall(500, () => { this.scene.stop(); this.scene.start('Hub'); });
  }

  _animElo() {
    this._eloT += 0.07;
    const t = this._eloT;
    const ex = this._eloTargetX + Math.sin(t * 1.2) * 9;
    const ey = this._eloTargetY + Math.cos(t * 0.85) * 5;
    this._elo.clear();
    // Aura
    this._elo.fillStyle(0x7080c0, 0.04 + Math.sin(t * 1.8) * 0.02);
    this._elo.fillCircle(ex, ey, 22 + Math.sin(t * 0.7) * 4);
    this._elo.fillStyle(0xa0b8f0, 0.10 + Math.sin(t * 2.2) * 0.04);
    this._elo.fillCircle(ex, ey, 10 + Math.sin(t) * 2);
    // Nucleo
    this._elo.fillStyle(0xdde8ff, 0.65 + Math.sin(t * 3) * 0.2);
    this._elo.fillCircle(ex, ey, 3);
    this._elo.fillStyle(0xffffff, 0.95);
    this._elo.fillRect(Math.round(ex) - 1, Math.round(ey) - 1, 2, 2);
    // Po de luz
    if (Math.random() < 0.25) {
      const dust = this.add.graphics();
      dust.fillStyle(0xaabbff, 0.3);
      dust.fillRect(Math.round(ex + (Math.random()-0.5)*6), Math.round(ey + (Math.random()-0.5)*6), 1, 1);
      this.tweens.add({ targets: dust, alpha: 0, duration: 400, onComplete: () => dust.destroy() });
    }
  }
}

class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    // Animate boot bar
    let prog = 0;
    const bar = document.getElementById('boot-bar');
    const txt = document.getElementById('boot-text');
    const msgs = ['fechando os olhos...','caindo em somnara...','procurando elo...','o sonho espera.'];
    const interval = setInterval(() => {
      prog += 8 + Math.random() * 12;
      if (prog > 100) prog = 100;
      bar.style.width = prog + '%';
      txt.textContent = msgs[Math.min(3, Math.floor(prog / 26))];
      if (prog >= 100) {
        clearInterval(interval);
        setTimeout(() => {
          document.getElementById('boot-screen').style.display = 'none';
          // Mostra intro apenas na primeira visita da sessao
          const showIntro = !sessionStorage.getItem('somnara_intro_seen');
          if (showIntro) {
            sessionStorage.setItem('somnara_intro_seen', '1');
            this.scene.start('Intro');
          } else {
            this.scene.start('Hub');
          }
        }, 400);
      }
    }, 80);

    buildTextures(this);
    Perm.load();
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  SCENE — HUB  (The Penitent's Sanctum)
// ════════════════════════════════════════════════════════════════════════════
class HubScene extends Phaser.Scene {
  constructor() { super('Hub'); }

  create() {
    buildTextures(this);
    this.cameras.main.setBackgroundColor('#050408');
    this._buildLevel();
    this._buildUI();
    this._spawnPlayer();
    this.keys = this.input.keyboard.addKeys({
      left:Phaser.Input.Keyboard.KeyCodes.LEFT, right:Phaser.Input.Keyboard.KeyCodes.RIGHT,
      A:Phaser.Input.Keyboard.KeyCodes.A, D:Phaser.Input.Keyboard.KeyCodes.D,
      up:Phaser.Input.Keyboard.KeyCodes.UP, W:Phaser.Input.Keyboard.KeyCodes.W,
      SPACE:Phaser.Input.Keyboard.KeyCodes.SPACE, E:Phaser.Input.Keyboard.KeyCodes.E,
    });
    if (!this.scene.isActive('UI')) this.scene.launch('UI');
    Bus.emit('run:hub');
    Run.reset();
  }

  _buildLevel() {
    const gfx = this.add.graphics();

    // Atmospheric gradient background — cathedral interior
    for (let y = 0; y < H; y += 2) {
      const t = y / H;
      const r = Math.round(5 + t * 8);
      const g = Math.round(4 + t * 6);
      const b = Math.round(8 + t * 14);
      gfx.fillStyle(Phaser.Display.Color.GetColor(r, g, b));
      gfx.fillRect(0, y, W, 2);
    }

    // Cathedral arches (background detail)
    gfx.lineStyle(0.5, 0x1a1526, 0.8);
    for (let i = 0; i < 5; i++) {
      const ax = 40 + i * 100;
      gfx.fillStyle(0x080610, 0.7);
      gfx.fillRect(ax, 0, 60, H - 40);
      gfx.fillStyle(0x0e0c14, 0.5);
      gfx.fillRect(ax + 5, 0, 50, H - 45);
      // Arch top
      gfx.fillStyle(0x1a1526, 0.4);
      for (let j = 0; j < 20; j++) {
        const angle = (j / 19) * Math.PI;
        const ax2 = ax + 30 + Math.cos(angle) * 25;
        const ay2 = 30 - Math.sin(angle) * 30;
        gfx.fillRect(Math.round(ax2) - 1, Math.round(ay2), 2, 2);
      }
    }

    // Stained glass windows (abstract colored panes)
    [[80, 20, 0x6a5ad8], [200, 15, 0x3a6ad8], [330, 20, 0xd88ad8], [420, 18, 0x4ad8c8]].forEach(([x, y, col]) => {
      gfx.fillStyle(col, 0.15); gfx.fillRect(x, y, 24, 40);
      gfx.fillStyle(col, 0.25); gfx.fillRect(x + 4, y + 2, 16, 36);
      // Cross mullion
      gfx.fillStyle(0x1a1526, 0.8); gfx.fillRect(x, y + 18, 24, 2); gfx.fillRect(x + 10, y, 4, 40);
    });

    // Floor
    this.platforms = this.physics.add.staticGroup();
    for (let x = 0; x < W; x += 16) {
      this.platforms.create(x + 8, H - 4, 'tile_ground').setDisplaySize(16, 8).refreshBody();
    }

    // Platforms
    [[80,185,5],[220,165,4],[350,178,5],[420,200,3]].forEach(([px, py, pw]) => {
      for (let i = 0; i < pw; i++)
        this.platforms.create(px + i * 16 + 8, py, 'tile_plat').setDisplaySize(16, 8).refreshBody();
    });

    // Walls
    for (let y = 0; y < H; y += 16) {
      this.platforms.create(8, y + 8, 'tile_wall').setDisplaySize(16, 16).refreshBody();
      this.platforms.create(W - 8, y + 8, 'tile_wall').setDisplaySize(16, 16).refreshBody();
    }

    // Portal / bonfire
    this.portalSprite = this.add.image(W / 2, H - 58, 'portal').setOrigin(0.5);
    this.portalGlow = this.add.graphics();

    // Ambient lore text (environmental storytelling — lore de Somnara)
    const lore = [
      'VOCE VEIO PRA SE ESCONDER OU SE ENCONTRAR?',
      'CADA SONHO DEIXA UMA CICATRIZ',
      'SOMNARA LEMBRA O QUE VOCE ESQUECEU',
      'ELO NAO FOGE',
    ];
    lore.forEach((txt, i) => {
      this.add.text(30 + i * 110, 60 + (i % 2) * 40, txt, {
        fontFamily: 'monospace', fontSize: '4px', color: '#1a1526'
      }).setAngle(-3 + i * 2).setAlpha(0.22);
    });

    // Fragmentos de lore flututando como folhas
    const fragments = [
      { txt: '"Ele aprendeu a encolher."', x: 40,  y: 100, angle: -8 },
      { txt: '"Nao fazer barulho."',        x: 200, y: 80,  angle: 5  },
      { txt: '"O lugar simplesmente...\nesperava."', x: 340, y: 120, angle: -4 },
      { txt: '"As vezes e o suficiente."', x: 110, y: 145, angle: 7  },
    ];
    fragments.forEach(({ txt, x, y, angle }) => {
      this.add.text(x, y, txt, {
        fontFamily: 'monospace', fontSize: '4px', color: '#2a2850',
        align: 'center', wordWrap: { width: 80 }
      }).setAngle(angle).setAlpha(0.18);
    });

    // NPC labels
    [[60, H - 14, 'TECEDOR\n[fragmentos]', '#2a2838'],
     [W - 60, H - 14, 'ORÁCULO\n[memória]', '#1a2818'],
     [W / 2 - 80, H - 14, 'ELO\n[companhia]', '#1a1828']].forEach(([x, y, lbl, col]) => {
      this.add.text(x, y - 16, lbl, { fontFamily: 'monospace', fontSize: '5px', color: col, align: 'center' }).setOrigin(0.5);
      gfx.fillStyle(0x1a1020, 0.9); gfx.fillRect(x - 6, y - 20, 12, 20);
      gfx.fillStyle(0x2a2030); gfx.fillCircle(x, y - 24, 5);
    });

    // Dripping blood VFX (static)
    for (let i = 0; i < 8; i++) {
      gfx.fillStyle(0x330808, 0.6);
      const bx = 40 + i * 54;
      for (let j = 0; j < 3; j++) {
        gfx.fillRect(bx + j * 3, H - 20 - j * 8, 2, j * 8 + 4);
      }
    }

    this.time.addEvent({ delay: 60, loop: true, callback: () => this._animPortal() });
  }

  _animPortal() {
    this.portalGlow.clear();
    const t = Date.now() / 1000;
    this.portalGlow.lineStyle(1, 0xcc4010, 0.3 + Math.sin(t * 2) * 0.15);
    this.portalGlow.strokeEllipse(W / 2, H - 58, 32 + Math.sin(t) * 3, 46 + Math.cos(t) * 2);
    this.portalGlow.lineStyle(1, 0xff8020, 0.15 + Math.sin(t * 3) * 0.1);
    this.portalGlow.strokeEllipse(W / 2, H - 58, 44 + Math.sin(t * 0.7) * 4, 60 + Math.cos(t * 0.8) * 3);
    this.portalSprite.setAngle(Math.sin(t * 0.5) * 2);
    // Ember particles occasionally
    if (Math.random() < 0.15) {
      const ember = this.add.image(W / 2 + (Math.random() - 0.5) * 14, H - 50, 'particle_ember');
      this.tweens.add({ targets: ember, y: H - 80 - Math.random() * 30, x: W / 2 + (Math.random() - 0.5) * 30, alpha: 0, duration: 600 + Math.random() * 400, onComplete: () => ember.destroy() });
    }
  }

  _buildUI() {
    this.add.text(8, 8, `SONHOS: ${Perm.totalRuns}  ·  ECOS: ${Perm.echos}Ξ  ·  MAIS FUNDO: CAMADA ${Perm.bestDepth}`, {
      fontFamily: 'monospace', fontSize: '5px', color: '#1a1526'
    });
    this.add.text(W / 2, H - 72, document.body.classList.contains('is-touch') ? '[ ATK ]  FECHAR OS OLHOS' : '[ E ]  FECHAR OS OLHOS', {
      fontFamily: 'monospace', fontSize: '6px', color: '#5a4ad8', align: 'center'
    }).setOrigin(0.5);
    this.add.text(W - 5, H - 5, 'SOMNARA  v0.1', {
      fontFamily: 'monospace', fontSize: '4px', color: '#0a0810'
    }).setOrigin(1, 1);

    // Botao "rever historia"
    const histBtn = this.add.text(8, H - 5, '[ H ]  REVER HISTORIA', {
      fontFamily: 'monospace', fontSize: '4px', color: '#151530'
    }).setOrigin(0, 1).setInteractive({ useHandCursor: true });
    histBtn.on('pointerover', () => histBtn.setColor('#5060a0'));
    histBtn.on('pointerout',  () => histBtn.setColor('#151530'));
    histBtn.on('pointerdown', () => this._openIntro());
    this.input.keyboard.on('keydown-H', () => this._openIntro());

    // ── ÁRVORE DE HABILIDADES (TECEDOR) ─────────────────────────────────
    const TREE = [
      { id:'voz',       label:'VOZ',      cost:15, max:3, desc:'+12% dano · +3% crítico por nível', col:'#9ad8ff' },
      { id:'memoria',   label:'MEMÓRIA',  cost:12, max:3, desc:'+15 energia máx · regen +15% por nível', col:'#aee0ff' },
      { id:'vinculo',   label:'VÍNCULO',  cost:15, max:3, desc:'+15 vontade máx · Elo cura quando parado', col:'#c8b8ff' },
      { id:'despertar', label:'DESPERTAR',cost:40, max:1, desc:'1ª queda fatal: sobrevive com 15% de vontade',
        req: () => Perm.upgrades.voz >= 1 && Perm.upgrades.memoria >= 1 && Perm.upgrades.vinculo >= 1, col:'#eaf4ff' },
    ];

    const shopX = 55, shopY = H - 50;
    const gfx = this.add.graphics();
    gfx.fillStyle(0x080610, 0.9); gfx.fillRect(shopX - 10, shopY - 22, 230, 40);
    gfx.lineStyle(0.5, 0x6b3a1a); gfx.strokeRect(shopX - 10, shopY - 22, 230, 40);
    this.add.text(shopX + 105, shopY - 19, 'TECEDOR  —  ÁRVORE DE SI', {
      fontFamily: 'monospace', fontSize: '5px', color: '#6b3a1a'
    }).setOrigin(0.5, 0);

    TREE.forEach((item, i) => {
      const bx = shopX + i * 56, by = shopY - 4;
      const owned = Perm.upgrades[item.id] || 0;
      const maxed = owned >= item.max;
      const locked = item.req ? !item.req() : false;
      const cost = item.cost + owned * 10;
      const canBuy = !maxed && !locked && Perm.echos >= cost;

      const bg = this.add.graphics();
      const drawBg = (hover) => {
        bg.clear();
        bg.fillStyle(hover && !locked ? 0x1a1828 : 0x0e0c14, 0.9); bg.fillRect(bx - 26, by - 10, 52, 26);
        bg.lineStyle(0.5, maxed ? 0xc8a030 : locked ? 0x221820 : canBuy ? 0x4a3838 : 0x221820); bg.strokeRect(bx - 26, by - 10, 52, 26);
      };
      drawBg(false);

      const col = maxed ? '#c8a030' : locked ? '#3a2828' : canBuy ? item.col : '#3a2828';
      this.add.text(bx, by - 7, item.label, { fontFamily:'monospace', fontSize:'5px', color: col }).setOrigin(0.5, 0);
      this.add.text(bx, by - 1, maxed ? 'MAX' : locked ? '???' : `${cost}Ξ`, { fontFamily:'monospace', fontSize:'5px', color: maxed ? '#c8a030' : '#4060aa' }).setOrigin(0.5, 0);
      this.add.text(bx, by + 6, `(${owned}/${item.max})`, { fontFamily:'monospace', fontSize:'4px', color: '#2a2838' }).setOrigin(0.5, 0);

      if (!maxed && !locked) {
        const zone = this.add.zone(bx, by + 3, 52, 28).setInteractive();
        zone.on('pointerover', () => { drawBg(true); });
        zone.on('pointerout', () => { drawBg(false); });
        zone.on('pointerdown', () => {
          if (Perm.echos >= cost && Perm.upgrades[item.id] < item.max) {
            Perm.echos -= cost;
            Perm.upgrades[item.id] = (Perm.upgrades[item.id] || 0) + 1;
            Perm.save();
            SFX.play('relic');
            // Restart Hub scene to refresh UI
            this.scene.restart();
          }
        });
      }
    });
  }

  _spawnPlayer() {
    this.player = this.physics.add.sprite(W / 2 - 60, H - 40, 'player_idle');
    this.player.setCollideWorldBounds(true);
    this.player.body.setGravityY(GRAVITY);
    this.player.setSize(10, 20).setOffset(2, 4);
    this.physics.add.collider(this.player, this.platforms);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
    this.cameras.main.setBounds(0, 0, W, H);
  }

  update() {
    if (!this.player) return;
    const k = this.keys, b = this.player.body;
    const goLeft = k.left.isDown || k.A.isDown || Touch.left;
    const goRight = k.right.isDown || k.D.isDown || Touch.right;
    if (goLeft) {
      this.player.setVelocityX(-SPD); this.player.setFlipX(true);
      this.player.setTexture('player_run' + (Math.floor(Date.now() / 110) % 3 + 1));
    } else if (goRight) {
      this.player.setVelocityX(SPD); this.player.setFlipX(false);
      this.player.setTexture('player_run' + (Math.floor(Date.now() / 110) % 3 + 1));
    } else {
      this.player.setVelocityX(0); this.player.setTexture('player_idle');
    }
    if ((k.up.isDown || k.W.isDown || k.SPACE.isDown || Touch.jump) && b.blocked.down)
      this.player.setVelocityY(JUMP);
    if ((Phaser.Input.Keyboard.JustDown(k.E) || Touch.attack_just) &&
        Phaser.Math.Distance.Between(this.player.x, this.player.y, W / 2, H - 58) < 60) {
      Touch.attack_just = false;
      this._startRun();
    }
    Touch.attack_just = false;
  }

  _openIntro() {
    // Reseta flag de sessao para forcar exibicao
    sessionStorage.removeItem('somnara_intro_seen');
    this.cameras.main.fade(400, 0, 0, 0);
    this.time.delayedCall(400, () => {
      this.scene.stop('UI');
      this.scene.start('Intro');
    });
  }

  _startRun() {
    this.cameras.main.fade(400, 0, 0, 0);
    this.time.delayedCall(400, () => {
      Perm.totalRuns++; Perm.save();
      Run.reset();
      // Apply permanent upgrades
      Run.maxHp += (Perm.upgrades.maxHp || 0) * 20;
      Run.hp = Run.maxHp;
      Run.maxStamina += (Perm.upgrades.stamina || 0) * 20;
      Run.stamina = Run.maxStamina;
      if (Perm.upgrades.dmg) Run.buffs.dmgMult = 1 + (Perm.upgrades.dmg * 0.15);
      this.scene.start('Room', { seed: Date.now() % 0xFFFFFF, depth: 0 });
    });
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  SCENE — ROOM  (Combat)
// ════════════════════════════════════════════════════════════════════════════
class RoomScene extends Phaser.Scene {
  constructor() { super('Room'); }

  init(d) {
    this.seed = d.seed || 1;
    this.depth = d.depth || 0;
    this.rng = mulberry32(this.seed);
    this.isBossRoom = (this.depth > 0 && this.depth % 4 === 0);
    Run.roomHistory.push({ depth: this.depth, boss: this.isBossRoom, cleared: false });
  }

  create() {
    buildTextures(this);
    this.cameras.main.setBackgroundColor('#050408');

    // State
    this.enemies = []; this.pickups = [];
    this.isDead = false; this.cleared = false;
    this.dashCd = 0; this.parryCd = 0; this.parryWin = 0;
    this.dashing = false; this.parrying = false; this.attacking = false;
    this.invincible = false; this.attackTimer = 0;
    this.facingRight = true; this.comboStep = 0; this.comboTimer = 0;
    this.iframeFlash = 0; this.paused = false; this.slowmo = 0;

    this._buildRoom();
    this._spawnPlayer();
    this.isBossRoom ? this._spawnBoss() : this._spawnEnemies();
    this._setupCollisions();
    this._setupKeys();

    if (!this.scene.isActive('UI')) this.scene.launch('UI');
    this.cameras.main.setBounds(0, 0, this._roomW, H);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

    // Notifica UI sobre profundidade (para mensagens de Elo)
    Bus.emit('room:start', this.depth);

    // Room label
    const label = this.isBossRoom
      ? `⚠  CAMADA ABISSAL  ·  O FRAGMENTADO MAIOR  ·  CAMADA ${this.depth}`
      : `CAMADA ${this.depth + 1}  ·  SOMNARA  ·  SONHO ${this.depth}`;
    this.add.text(W / 2, 6, label, {
      fontFamily: 'monospace', fontSize: this.isBossRoom ? '6px' : '5px',
      color: this.isBossRoom ? '#cc2020' : '#1a1526', align: 'center'
    }).setScrollFactor(0).setOrigin(0.5, 0);
  }

  _buildRoom() {
    const cols = this.isBossRoom ? 40 : 28 + Math.floor(this.rng() * 12);
    this._roomW = cols * 16;
    this.physics.world.setBounds(0, 0, this._roomW, H);

    const gfx = this.add.graphics();

    // Background gradient
    for (let y = 0; y < H; y += 2) {
      const t = y / H;
      const r = Math.round(5 + t * 6);
      const g2 = Math.round(4 + t * 5);
      const b = Math.round(8 + t * 12);
      gfx.fillStyle(Phaser.Display.Color.GetColor(r, g2, b));
      gfx.fillRect(0, y, this._roomW, 2);
    }

    // Cathedral columns
    for (let x = 80; x < this._roomW - 40; x += 96) {
      gfx.fillStyle(0x0a0810, 0.9); gfx.fillRect(x, 0, 20, H - 30);
      gfx.fillStyle(0x0e0c14, 0.6); gfx.fillRect(x + 2, 0, 16, H - 32);
      gfx.fillStyle(0x1a1526, 0.3); gfx.fillRect(x + 4, 0, 12, H - 34);
      // Column capital
      gfx.fillStyle(0x1a1526); gfx.fillRect(x - 3, 0, 26, 4);
      // Blood stains on columns
      gfx.fillStyle(0x330808, 0.4); gfx.fillRect(x + 6, 20, 8, 40);
    }

    // Stained glass ceiling
    for (let x = 40; x < this._roomW; x += 120) {
      const cols2 = [0x6a5ad8, 0x3a6ad8, 0xd88ad8, 0x3aa8c8];
      const col = cols2[Math.floor(this.rng() * 4)];
      gfx.fillStyle(col, 0.12); gfx.fillRect(x, 0, 70, 35);
      gfx.fillStyle(0x0a0810, 0.8); gfx.fillRect(x + 30, 0, 3, 35);
      gfx.fillStyle(0x0a0810, 0.8); gfx.fillRect(x, 16, 70, 3);
    }

    // Atmospheric candles/torches
    for (let x = 60; x < this._roomW; x += 80) {
      const ty = 30 + Math.floor(this.rng() * 40);
      gfx.fillStyle(0x2a1a08); gfx.fillRect(x, ty, 4, 10);
      gfx.fillStyle(0xff8020, 0.4); gfx.fillRect(x - 2, ty - 6, 8, 8);
      gfx.fillStyle(0xffcc60, 0.6); gfx.fillRect(x, ty - 4, 4, 5);
      gfx.fillStyle(0xffffff, 0.3); gfx.fillRect(x + 1, ty - 3, 2, 2);
    }

    // Lore/atmosphere text
    // Textos ambiente — fragmentos da narrativa de Somnara espalhados pelas paredes
    const atm = [
      'VOCE JA ESTEVE AQUI?', 'ELE APRENDEU A ENCOLHER',
      'SOMNARA LEMBRA', 'OS RIOS SOBEM',
      'AS ARVORES TEM RAIZES NO CEU', 'O LUGAR ESPERAVA',
      'ELO FICA PERTO', 'ONDE OS SONHOS GUARDAM',
      'NAO TEM VOLTA FACIL', 'O DIA QUE TALVEZ NUNCA EXISTIU',
    ];
    for (let i = 0; i < Math.floor(this._roomW / 120); i++) {
      this.add.text(60 + i * 120, 8 + (i % 2) * 20, atm[i % atm.length], {
        fontFamily: 'monospace', fontSize: '4px', color: '#0e0c14'
      }).setAlpha(0.35);
    }

    // Floor tiles
    this.platforms = this.physics.add.staticGroup();
    for (let x = 0; x < this._roomW; x += 16)
      this.platforms.create(x + 8, H - 4, 'tile_ground').setDisplaySize(16, 8).refreshBody();

    // Platforms
    const platCount = this.isBossRoom ? 4 : 2 + Math.floor(this.rng() * 5);
    for (let i = 0; i < platCount; i++) {
      const px = 80 + Math.floor(this.rng() * (this._roomW - 180));
      const py = 110 + Math.floor(this.rng() * 90);
      const pw = 3 + Math.floor(this.rng() * 4);
      for (let j = 0; j < pw; j++)
        this.platforms.create(px + j * 16 + 8, py, 'tile_plat').setDisplaySize(16, 8).refreshBody();
    }

    // Walls
    for (let y = 0; y < H; y += 16) {
      this.platforms.create(8, y + 8, 'tile_wall').setDisplaySize(16, 16).refreshBody();
      this.platforms.create(this._roomW - 8, y + 8, 'tile_wall').setDisplaySize(16, 16).refreshBody();
    }
    for (let x = 0; x < this._roomW; x += 16)
      this.platforms.create(x + 8, 8, 'tile_wall').setDisplaySize(16, 16).refreshBody();

    // Exit door (initially closed)
    this.exitDoor = this.add.graphics();
    this._drawDoor(false);
    this.exitZone = this.add.zone(this._roomW - 18, H / 2, 24, H - 16).setOrigin(0.5);
    this.physics.world.enable(this.exitZone);
    this.exitZone.body.setAllowGravity(false);

    // Boss room altar
    if (this.isBossRoom) {
      gfx.fillStyle(0x1a1020, 0.9); gfx.fillRect(this._roomW / 2 - 60, H - 40, 120, 30);
      gfx.fillStyle(0x2a1830, 0.8); gfx.fillRect(this._roomW / 2 - 50, H - 38, 100, 26);
      gfx.fillStyle(0xc8a030, 0.6);
      for (let i = 0; i < 5; i++) {
        gfx.fillRect(this._roomW / 2 - 40 + i * 20, H - 40, 2, 6);
        gfx.fillRect(this._roomW / 2 - 40 + i * 20, H - 10, 2, 2);
      }
    }
  }

  _drawDoor(open) {
    this.exitDoor.clear();
    if (open) {
      this.exitDoor.fillStyle(0x050810, 0.95);
      this.exitDoor.fillRect(this._roomW - 20, H / 2 - 35, 18, 70);
      this.exitDoor.fillStyle(0x0a1420, 0.9);
      this.exitDoor.fillRect(this._roomW - 18, H / 2 - 33, 14, 66);
      // Open glow
      this.exitDoor.fillStyle(0x104060, 0.4);
      this.exitDoor.fillRect(this._roomW - 16, H / 2 - 30, 10, 60);
      this.add.text(this._roomW - 10, H / 2 - 44, '→\nADIANTE', {
        fontFamily: 'monospace', fontSize: '5px', color: '#2a6080', align: 'center'
      }).setOrigin(0.5);
    } else {
      this.exitDoor.fillStyle(0x1a0808, 0.95);
      this.exitDoor.fillRect(this._roomW - 20, H / 2 - 35, 18, 70);
      this.exitDoor.fillStyle(0x200c08);
      this.exitDoor.fillRect(this._roomW - 18, H / 2 - 33, 14, 66);
      // Iron bands
      this.exitDoor.fillStyle(0x1a1828);
      for (let i = 0; i < 3; i++) this.exitDoor.fillRect(this._roomW - 18, H / 2 - 20 + i * 18, 14, 2);
      // Lock sigil
      this.exitDoor.fillStyle(0xcc1010, 0.6);
      this.exitDoor.fillCircle(this._roomW - 11, H / 2, 4);
      this.exitDoor.fillStyle(0xff2020, 0.3);
      this.exitDoor.fillCircle(this._roomW - 11, H / 2, 6);
    }
  }

  _spawnPlayer() {
    this.player = this.physics.add.sprite(40, H - 60, 'player_idle');
    this.player.setCollideWorldBounds(true);
    this.player.body.setGravityY(GRAVITY);
    this.player.setSize(10, 20).setOffset(2, 4);
    // Attack hitbox
    this.atkBox = this.add.rectangle(0, 0, 26, 14);
    this.physics.world.enable(this.atkBox);
    this.atkBox.body.setAllowGravity(false);
    this.atkBox.setActive(false);
  }

  _spawnEnemies() {
    const count = 1 + Math.floor(this.rng() * (2 + Math.min(this.depth, 4)));
    for (let i = 0; i < count; i++) {
      const x = 140 + Math.floor(this.rng() * (this._roomW - 240));
      const isElite = this.depth >= 2 && this.rng() < 0.25;
      const hp = isElite ? 60 + this.depth * 12 : 35 + this.depth * 8;
      const e = {
        sprite: this.physics.add.sprite(x, H - 60, isElite ? 'inq_idle' : 'grunt_idle'),
        hp, maxHp: hp,
        speed: isElite ? 50 + this.depth * 3 : 42 + this.depth * 4,
        atk: isElite ? 18 + this.depth * 3 : 12 + this.depth * 2,
        atkCd: 0, state: 'idle', stateT: 0,
        facing: false, alive: true, isElite,
        idleKey: isElite ? 'inq_idle' : 'grunt_idle',
        runKey: isElite ? 'inq_idle' : 'grunt_run',
        atkKey: isElite ? 'inq_idle' : 'grunt_atk',
        hurtKey: isElite ? 'inq_idle' : 'grunt_hurt',
        deathKey: 'grunt_death',
      };
      e.sprite.setCollideWorldBounds(true);
      e.sprite.body.setGravityY(GRAVITY);
      e.sprite.setSize(10, 20).setOffset(2, 3);
      e.hpBar = this.add.graphics();
      this._drawEnemyHp(e);
      this.enemies.push(e);
    }
  }

  _spawnBoss() {
    const bx = this._roomW / 2;
    const b = {
      sprite: this.physics.add.sprite(bx, H - 70, 'boss_idle'),
      hp: 200 + this.depth * 20, maxHp: 200 + this.depth * 20,
      speed: 35, atk: 22 + this.depth * 2,
      atkCd: 0, state: 'idle', stateT: 0,
      facing: false, alive: true, isBoss: true, phase: 1,
      idleKey: 'boss_idle', runKey: 'boss_idle', atkKey: 'boss_atk',
      hurtKey: 'boss_idle', deathKey: 'boss_idle',
    };
    b.sprite.setCollideWorldBounds(true);
    b.sprite.body.setGravityY(GRAVITY);
    b.sprite.setSize(26, 44).setOffset(5, 6);
    b.hpBar = this.add.graphics();
    b.nameText = this.add.text(W / 2, H - 14, 'O FRAGMENTADO MAIOR — O VAZIO DE PESO', {
      fontFamily: 'monospace', fontSize: '7px', color: '#4a3a8a',
      stroke: '#000', strokeThickness: 1
    }).setScrollFactor(0).setOrigin(0.5, 1);
    b.hpBg = this.add.graphics().setScrollFactor(0);
    b.hpBg.fillStyle(0x0a0810, 0.9); b.hpBg.fillRect(W / 2 - 80, H - 13, 160, 7);
    b.hpBg.lineStyle(0.5, 0x3a1020); b.hpBg.strokeRect(W / 2 - 80, H - 13, 160, 7);
    this._drawEnemyHp(b);
    this.enemies.push(b);

    // Boss intro shake
    this.cameras.main.shake(400, 0.01);
    this.cameras.main.flash(200, 80, 10, 10);
  }

  _setupCollisions() {
    this.enemies.forEach(e => this.physics.add.collider(e.sprite, this.platforms));
    this.physics.add.collider(this.player, this.platforms);
  }

  _setupKeys() {
    this.keys = this.input.keyboard.addKeys({
      left:Phaser.Input.Keyboard.KeyCodes.LEFT, right:Phaser.Input.Keyboard.KeyCodes.RIGHT,
      A:Phaser.Input.Keyboard.KeyCodes.A, D:Phaser.Input.Keyboard.KeyCodes.D,
      up:Phaser.Input.Keyboard.KeyCodes.UP, W:Phaser.Input.Keyboard.KeyCodes.W,
      SPACE:Phaser.Input.Keyboard.KeyCodes.SPACE,
      Z:Phaser.Input.Keyboard.KeyCodes.Z,
      X:Phaser.Input.Keyboard.KeyCodes.X,
      C:Phaser.Input.Keyboard.KeyCodes.C,
      P:Phaser.Input.Keyboard.KeyCodes.P,
    });
    this.input.keyboard.on('keydown-Z', () => this._doAttack());
    this.input.keyboard.on('keydown-X', () => this._doParry());
    this.input.keyboard.on('keydown-C', () => this._doDash());
    this.input.keyboard.on('keydown-P', () => this._togglePause());
    this.input.keyboard.on('keydown-ESC', () => this._togglePause());
  }

  _togglePause() {
    this.paused = !this.paused;
    if (this.paused) {
      this.physics.pause();
      // Dim overlay
      if (!this._pauseOverlay) {
        this._pauseOverlay = this.add.graphics().setScrollFactor(0).setDepth(100);
        this._pauseOverlay.fillStyle(0x000000, 0.7); this._pauseOverlay.fillRect(0,0,W,H);
        this._pauseTxt = this.add.text(W/2, H/2 - 20, 'PAUSA', {
          fontFamily:'monospace', fontSize:'16px', color:'#4a3a8a', letterSpacing:8,
          stroke:'#000', strokeThickness:2
        }).setOrigin(0.5).setScrollFactor(0).setDepth(101);
        this._pauseTxt2 = this.add.text(W/2, H/2 + 4, '[ P ]  CONTINUAR', {
          fontFamily:'monospace', fontSize:'6px', color:'#3a2820', letterSpacing:2
        }).setOrigin(0.5).setScrollFactor(0).setDepth(101);
        this._pauseTxt3 = this.add.text(W/2, H/2 + 18, 'CONTROLES: Z AGIR · X CONFIAR · C DESVIAR', {
          fontFamily:'monospace', fontSize:'4px', color:'#1a1020', letterSpacing:1
        }).setOrigin(0.5).setScrollFactor(0).setDepth(101);
      } else {
        this._pauseOverlay.setVisible(true);
        this._pauseTxt.setVisible(true); this._pauseTxt2.setVisible(true); this._pauseTxt3.setVisible(true);
      }
    } else {
      this.physics.resume();
      if (this._pauseOverlay) {
        this._pauseOverlay.setVisible(false);
        this._pauseTxt.setVisible(false); this._pauseTxt2.setVisible(false); this._pauseTxt3.setVisible(false);
      }
    }
  }

  update(_, delta) {
    if (Touch.attack_just) { Touch.attack_just = false; if (!this.isDead && !this.paused) this._doAttack(); }
    if (Touch.parry_just) { Touch.parry_just = false; if (!this.isDead && !this.paused) this._doParry(); }
    if (Touch.dash_just) { Touch.dash_just = false; if (!this.isDead && !this.paused) this._doDash(); }
    if (Touch.pause_just) { Touch.pause_just = false; if (!this.isDead) this._togglePause(); }
    if (this.isDead || this.paused) return;
    this.dashCd = Math.max(0, this.dashCd - delta);
    this.parryCd = Math.max(0, this.parryCd - delta);
    this.parryWin = Math.max(0, this.parryWin - delta);
    this.comboTimer = Math.max(0, this.comboTimer - delta);
    this.attackTimer = Math.max(0, this.attackTimer - delta);
    if (this.attackTimer <= 0) this.attacking = false;

    // Combo timeout
    if (Run.combo > 0 && Date.now() > Run.comboExpiry) Run.resetCombo();

    // Stamina regen
    Run.regenStamina(delta);

    // Slowmo crit effect
    if (this.slowmo > 0) {
      this.slowmo -= delta;
      this.physics.world.timeScale = this.slowmo > 0 ? 0.25 : 1;
      if (this.slowmo <= 0) this.physics.world.timeScale = 1;
    }

    // Iframe flash
    if (this.invincible) {
      this.iframeFlash += delta;
      this.player.setAlpha(Math.sin(this.iframeFlash * 0.025) * 0.4 + 0.6);
    } else {
      this.player.setAlpha(1);
      this.iframeFlash = 0;
    }

    this._movePlayer(delta);
    this._updateAtkBox();
    this.enemies.forEach(e => this._updateEnemy(e, delta));
    this._checkExitOverlap();
    this._updatePickups();
  }

  _movePlayer(delta) {
    const k = this.keys, b = this.player.body;
    const goLeft = k.left.isDown || k.A.isDown || Touch.left;
    const goRight = k.right.isDown || k.D.isDown || Touch.right;
    if (this.dashing) return;
    if (this.attacking) {
      // Permite movimento reduzido durante o ataque (não trava o jogador)
      if (goLeft) {
        this.player.setVelocityX(-SPD * 0.35); this.facingRight = false; this.player.setFlipX(true);
      } else if (goRight) {
        this.player.setVelocityX(SPD * 0.35); this.facingRight = true; this.player.setFlipX(false);
      } else {
        this.player.setVelocityX(0);
      }
      return;
    }
    if (goLeft) {
      this.player.setVelocityX(-SPD); this.facingRight = false; this.player.setFlipX(true);
      this.player.setTexture('player_run' + (Math.floor(Date.now() / 110) % 3 + 1));
    } else if (goRight) {
      this.player.setVelocityX(SPD); this.facingRight = true; this.player.setFlipX(false);
      this.player.setTexture('player_run' + (Math.floor(Date.now() / 110) % 3 + 1));
    } else {
      this.player.setVelocityX(0);
      this.player.setTexture(this.parrying ? 'player_parry' : 'player_idle');
    }
    if ((k.up.isDown || k.W.isDown || k.SPACE.isDown || Touch.jump) && b.blocked.down)
      this.player.setVelocityY(JUMP);
  }

  _doAttack() {
    if (this.attacking || this.parrying) return;
    this.attacking = true;
    const isCombo = this.comboStep === 1 && this.comboTimer > 0;
    this.comboStep = isCombo ? 0 : 1;
    this.comboTimer = COMBO_WIN;
    this.attackTimer = ATTACK_DUR;

    const frames = isCombo ? ['player_atk3'] : ['player_atk1', 'player_atk2'];
    const frame = frames[Math.floor(Math.random() * frames.length)];
    this.player.setTexture(frame);
    this.atkBox.setActive(true);
    this.atkBox.body.setEnable(true);

    const dmg = Run.dmg() * (isCombo ? 1.5 : 1);
    this._checkAtkHit(dmg);

    // Sword slash VFX
    this._spawnSlashVFX();

    this.time.delayedCall(ATTACK_DUR - 40, () => {
      this.atkBox.setActive(false);
      this.atkBox.body.setEnable(false);
    });
  }

  _spawnSlashVFX() {
    const g = this.add.graphics();
    const ox = this.facingRight ? 18 : -18;
    const x = this.player.x + ox, y = this.player.y - 2;
    g.lineStyle(1, 0xc8d8e8, 0.9);
    for (let i = 0; i < 3; i++) {
      g.beginPath();
      g.moveTo(x - (this.facingRight ? 8 : -8), y - 8 + i * 4);
      g.lineTo(x + (this.facingRight ? 8 : -8), y - 4 + i * 4);
      g.strokePath();
    }
    this.tweens.add({ targets: g, alpha: 0, duration: 100, onComplete: () => g.destroy() });

    // Spark particles
    for (let i = 0; i < 3; i++) {
      const sp = this.add.image(x + (Math.random() - 0.5) * 10, y + (Math.random() - 0.5) * 10, 'particle_spark');
      this.tweens.add({
        targets: sp, x: x + (Math.random() - 0.5) * 20, y: y - 10 - Math.random() * 10,
        alpha: 0, duration: 180, onComplete: () => sp.destroy()
      });
    }
  }

  _doParry() {
    if (this.parryCd > 0 || this.attacking) return;
    if (!Run.useStamina(PARRY_STAMINA)) return; // stamina check
    SFX.play('parry');
    this.parrying = true;
    this.parryWin = Run.parryWindow();
    this.parryCd = PARRY_CD;
    this.player.setTexture('player_parry');
    this.time.delayedCall(Run.parryWindow() + 80, () => { this.parrying = false; });

    // Parry ward visual
    const g = this.add.graphics();
    g.lineStyle(1, 0xaabbff, 0.8);
    g.strokeCircle(this.player.x, this.player.y, 16);
    g.lineStyle(1, 0x8090ff, 0.4);
    g.strokeCircle(this.player.x, this.player.y, 22);
    this.tweens.add({ targets: g, alpha: 0, duration: Run.parryWindow(), onComplete: () => g.destroy() });
  }

  _doDash() {
    if (this.dashCd > 0 || this.dashing) return;
    if (!Run.useStamina(DASH_STAMINA)) return; // stamina check
    SFX.play('dash');
    this.dashing = true; this.invincible = true; this.dashCd = DASH_CD;
    const dir = this.facingRight ? 1 : -1;
    this.player.setVelocityX(DASH_SPD * dir);
    this.player.setVelocityY(-60);
    this.player.setTexture('player_dash');

    // Dash afterimage trail
    for (let i = 0; i < 3; i++) {
      this.time.delayedCall(i * 30, () => {
        const trail = this.add.image(this.player.x, this.player.y, 'player_dash');
        trail.setFlipX(!this.facingRight);
        trail.setAlpha(0.4 - i * 0.1);
        trail.setTint(0x4488cc);
        this.tweens.add({ targets: trail, alpha: 0, duration: 200, onComplete: () => trail.destroy() });
      });
    }

    this.time.delayedCall(DASH_DUR, () => { this.dashing = false; });
    this.time.delayedCall(IFRAME_DUR, () => { this.invincible = false; });
  }

  _updateAtkBox() {
    if (!this.atkBox.active) return;
    const ox = this.facingRight ? 22 : -22;
    this.atkBox.setPosition(this.player.x + ox, this.player.y);
  }

  _checkAtkHit(dmg) {
    this.enemies.forEach(e => {
      if (!e.alive) return;
      const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, e.sprite.x, e.sprite.y);
      const inFront = this.facingRight ? e.sprite.x > this.player.x - 8 : e.sprite.x < this.player.x + 8;
      if (dist < 36 && inFront) {
        const crit = Math.random() < CRIT_CHANCE;
        const final = Math.round(crit ? dmg * CRIT_MULT : dmg);
        this._hitEnemy(e, final, crit);
      }
    });
  }

  _hitEnemy(e, dmg, crit) {
    e.hp -= dmg; e.state = 'hurt'; e.stateT = 220;
    e.sprite.setTexture(e.hurtKey);
    // White hit flash
    e.sprite.setTint(0xffffff);
    this.time.delayedCall(80, () => { if (e.alive) { e.sprite.clearTint(); e.sprite.setTexture(e.idleKey); } });
    this._drawEnemyHp(e);
    this._spawnNumber(e.sprite.x, e.sprite.y - 12, Math.round(dmg), crit ? '#ffdd00' : '#ff4444', crit);
    this._spawnBlood(e.sprite.x, e.sprite.y, crit ? 8 : 4);
    const kbDir = e.sprite.x > this.player.x ? 1 : -1;
    e.sprite.setVelocityX(200 * kbDir);

    SFX.play(crit ? 'crit' : 'hit');
    Run.addComboHit();

    // Crit slowmo: brief time scale reduction for impact
    if (crit) {
      this.slowmo = 80;
      this.physics.world.timeScale = 0.25;
      this.cameras.main.flash(80, 255, 220, 80, false);
    }

    // Flame Heart relic: deal extra fire damage over time on crit
    if (crit && Run.relics.find(r => r.id === 'flame_heart')) {
      this.time.delayedCall(300, () => { if (e.alive && e.hp > 0) this._hitEnemy(e, Math.round(dmg * 0.3), false); });
    }

    if (e.hp <= 0) this._killEnemy(e);
  }

  _killEnemy(e) {
    e.alive = false;
    e.sprite.setVelocityX(0);
    this._spawnBlood(e.sprite.x, e.sprite.y, e.isBoss ? 20 : 8);
    // Soul particles
    for (let i = 0; i < 6; i++) {
      const soul = this.add.image(e.sprite.x, e.sprite.y, 'particle_soul');
      this.tweens.add({
        targets: soul,
        x: e.sprite.x + (Math.random() - 0.5) * 40,
        y: e.sprite.y - 20 - Math.random() * 30,
        alpha: 0, duration: 500 + Math.random() * 300,
        onComplete: () => soul.destroy()
      });
    }
    const scrapAmt = e.isBoss ? 40 + this.depth * 5 : 5 + this.depth;
    Run.addScrap(scrapAmt); Run.kills++;
    Bus.emit(EV.ENEMY_DEATH);

    // Loot drops
    const lootRoll = this.rng();
    if (lootRoll < 0.45) this._spawnPickup(e.sprite.x, e.sprite.y - 8, lootRoll < 0.15 ? 'hp' : lootRoll < 0.28 ? 'stamina' : 'scrap');

    if (e.isBoss) {
      e.nameText?.destroy(); e.hpBg?.destroy();
      this.cameras.main.shake(300, 0.015);
      this.cameras.main.flash(400, 150, 30, 10);
    }

    e.sprite.setTint(0x220000);
    this.tweens.add({
      targets: e.sprite, alpha: 0, y: e.sprite.y - 12, duration: 400,
      onComplete: () => { e.sprite.destroy(); e.hpBar.destroy(); }
    });
    this.time.delayedCall(600, () => this._checkRoomClear());
  }

  _updateEnemy(e, delta) {
    if (!e.alive) return;
    e.atkCd = Math.max(0, e.atkCd - delta);
    if (e.stateT > 0) { e.stateT -= delta; return; }

    const dist = Phaser.Math.Distance.Between(e.sprite.x, e.sprite.y, this.player.x, this.player.y);
    const aggroRange = e.isBoss ? 300 : 150;
    const atkRange = e.isBoss ? 50 : 32;
    const atkCooldown = e.isBoss ? 1600 : 1300;

    // Boss phase 2 behavior (below 50% HP)
    if (e.isBoss && e.phase === 1 && e.hp < e.maxHp * 0.5) {
      e.phase = 2; e.speed *= 1.4; e.atk = Math.round(e.atk * 1.3);
      Bus.emit(EV.BOSS_PHASE, 2);
      this.cameras.main.shake(250, 0.012);
      this.cameras.main.flash(300, 120, 20, 10);
      this._spawnNumber(e.sprite.x, e.sprite.y - 20, 'FASE II', '#9ad8ff', true);
      // Emit embers
      for (let i = 0; i < 10; i++) {
        const em = this.add.image(e.sprite.x + (Math.random() - 0.5) * 30, e.sprite.y + (Math.random() - 0.5) * 20, 'particle_ember');
        this.tweens.add({
          targets: em, x: em.x + (Math.random() - 0.5) * 60, y: em.y - 40 - Math.random() * 40,
          alpha: 0, duration: 600 + Math.random() * 400, onComplete: () => em.destroy()
        });
      }
    }

    if (dist < aggroRange) {
      if (dist < atkRange && e.atkCd <= 0) {
        e.atkCd = atkCooldown; e.stateT = 250;
        e.sprite.setTexture(e.atkKey);
        this.time.delayedCall(140, () => { if (e.alive) e.sprite.setTexture(e.idleKey); });

        if (this.parrying && this.parryWin > 0) {
          this._parrySuccess(e);
        } else if (!this.invincible) {
          this._hurtPlayer(e.atk, e.sprite.x);
        }
        // Boss also fires projectile in phase 2
        if (e.isBoss && e.phase === 2) {
          this.time.delayedCall(300, () => this._spawnBossProjectile(e));
        }
      } else {
        const dir = this.player.x - e.sprite.x;
        e.sprite.setVelocityX(Math.sign(dir) * e.speed);
        e.sprite.setFlipX(dir < 0);
        e.sprite.setTexture(e.runKey);
      }
    } else {
      e.sprite.setVelocityX(0); e.sprite.setTexture(e.idleKey);
    }
    e.hpBar.setPosition(e.sprite.x, e.sprite.y);
  }

  _spawnBossProjectile(boss) {
    if (!boss.alive) return;
    const proj = this.add.graphics();
    proj.fillStyle(0xff4010, 0.9); proj.fillCircle(0, 0, 4);
    proj.fillStyle(0xff8030, 0.7); proj.fillCircle(0, 0, 2);
    proj.x = boss.sprite.x; proj.y = boss.sprite.y - 10;
    const dir = this.player.x - boss.sprite.x;
    const spd = Math.sign(dir) * 120;
    const update = this.time.addEvent({
      delay: 16, loop: true, callback: () => {
        proj.x += spd * 0.016;
        if (!proj.active) { update.destroy(); return; }
        const d = Phaser.Math.Distance.Between(proj.x, proj.y, this.player.x, this.player.y);
        if (d < 14) {
          if (!this.invincible) this._hurtPlayer(boss.atk * 0.6, proj.x);
          update.destroy(); proj.destroy();
        }
        if (proj.x < 0 || proj.x > this._roomW) { update.destroy(); proj.destroy(); }
      }
    });
    this.time.delayedCall(3000, () => { if (proj.active) { update.destroy(); proj.destroy(); } });
  }

  _parrySuccess(e) {
    Bus.emit(EV.PARRY);
    const g = this.add.graphics();
    g.fillStyle(0xaabbff, 0.8); g.fillCircle(this.player.x, this.player.y, 22);
    this.tweens.add({ targets: g, alpha: 0, scale: 2, duration: 250, onComplete: () => g.destroy() });

    // Sparks on parry
    for (let i = 0; i < 8; i++) {
      const sp = this.add.image(this.player.x, this.player.y, 'particle_spark');
      const angle = (i / 8) * Math.PI * 2;
      this.tweens.add({
        targets: sp, x: this.player.x + Math.cos(angle) * 20, y: this.player.y + Math.sin(angle) * 20,
        alpha: 0, duration: 250, onComplete: () => sp.destroy()
      });
    }
    this._spawnNumber(this.player.x, this.player.y - 22, 'PARADO!', '#aabbff', true);
    this.cameras.main.shake(80, 0.005);
    const counterDmg = Math.round(Run.dmg() * 1.8);
    this.time.delayedCall(80, () => this._hitEnemy(e, counterDmg, true));

    // Relic: blood firmware — heal on parry
    if (Run.relics.find(r => r.id === 'blood_fw')) Run.heal(4);
  }

  _hurtPlayer(dmg, srcX) {
    if (this.invincible || this.isDead) return;
    this.invincible = true;
    const kbDir = this.player.x < srcX ? -1 : 1;
    this.player.setVelocityX(220 * kbDir);
    this.player.setTexture('player_hurt');
    this.time.delayedCall(200, () => { if (!this.isDead) this.player.setTexture('player_idle'); });
    this.time.delayedCall(IFRAME_DUR, () => { this.invincible = false; });
    this.cameras.main.shake(100, 0.006);
    this.cameras.main.flash(60, 180, 20, 20);
    this._spawnBlood(this.player.x, this.player.y, 5);
    Run.hurt(dmg, srcX);
    Run.resetCombo();
    SFX.play('hit');
    // Echo Shield relic: absorb 30% damage once per room
    if (Run.hp <= 0) {
      // Echo Shield gives a second chance once per run
      if (Run.relics.find(r => r.id === 'echo_shield') && !Run._shieldUsed) {
        Run._shieldUsed = true;
        Run.hp = Math.ceil(Run.maxHp * 0.15);
        Bus.emit(EV.HIT, { hp: Run.hp, srcX });
        this._spawnNumber(this.player.x, this.player.y - 20, 'ESCUDO!', '#6080e0', true);
        this.cameras.main.flash(200, 80, 120, 200, false);
        return;
      }
      this.isDead = true;
      this.player.setTint(0x330000);
      SFX.play('death');
      this.time.delayedCall(700, () => {
        this.cameras.main.fade(300, 0, 0, 0);
        this.time.delayedCall(300, () => {
          this.scene.stop('UI');
          this.scene.start('GameOver');
        });
      });
    }
  }

  _checkRoomClear() {
    if (this.cleared) return;
    if (this.enemies.every(e => !e.alive)) {
      this.cleared = true; Run.roomsCleared++;
      // Mark in minimap history
      const hist = Run.roomHistory.find(r => r.depth === this.depth);
      if (hist) hist.cleared = true;
      if (this.depth > Perm.bestDepth) { Perm.bestDepth = this.depth; Perm.save(); }
      this._drawDoor(true);
      this.cameras.main.flash(200, 20, 80, 20);
      SFX.play('relic');
      // A cada 3 camadas, exibe fragmento de lore antes da recompensa
      const showLore = this.depth > 0 && this.depth % 3 === 0;
      this.time.delayedCall(500, () => {
        if (showLore) this._showLoreFragment(() => this._offerRelic());
        else this._offerRelic();
      });
    }
  }

  // ── FRAGMENTO DE LORE — aparece a cada 3 camadas ───────────────────────
  _showLoreFragment(callback) {
    const FRAGMENTS = [
      {
        speaker: 'SOMNARA',
        text: 'Somnara nao foi criada. Ela cresceu — alimentada por seculos de sonhos esquecidos, pesadelos engolidos, imaginacoes sufocadas antes de serem ditas em voz alta.',
        color: '#7a8ad8',
      },
      {
        speaker: 'O GAROTO',
        text: 'Ele pensou que tinha escapado. Por um tempo, parecia verdade. Em Somnara ele podia falar sem que ninguem risse. Podia ocupar espaco sem pedir desculpa.',
        color: '#a8c8e8',
      },
      {
        speaker: 'ELO',
        text: 'Elo existe para acompanhar quem chega sozinho. Nao resolve. Nao salva. So fica perto. E a primeira vez em muito tempo que algo nao fugiu.',
        color: '#c8d8ff',
      },
      {
        speaker: 'OS TECEDORES',
        text: 'Os Tecedores nao falam com palavras. Falam com imagens que aparecem na cabeca como lembrancas de coisas que nunca aconteceram.',
        color: '#d8b0ff',
      },
      {
        speaker: 'OS FRAGMENTADOS',
        text: 'Os Fragmentados sao criaturas nascidas de sonhos interrompidos, incompletas, perigosas nao por maldade mas por confusao. Eles nao sabem que sao pedacos de algo que nao foi terminado.',
        color: '#c8a8a8',
      },
      {
        speaker: 'SOMNARA',
        text: 'O mundo estava mudando em torno dele. As ruinas comecaram a ter a forma dos corredores da escola. As sombras tinham vozes conhecidas.',
        color: '#8880cc',
      },
    ];

    const frag = FRAGMENTS[Math.floor(Math.random() * FRAGMENTS.length)];
    const panelG = this.add.graphics().setScrollFactor(0).setDepth(50);
    const cx = W / 2, cy = H / 2;

    // Overlay
    panelG.fillStyle(0x000000, 0.88); panelG.fillRect(0, 0, W, H);
    panelG.fillStyle(0x05040e, 0.98); panelG.fillRect(cx - 160, cy - 55, 320, 110);
    panelG.lineStyle(0.5, 0x2a2050); panelG.strokeRect(cx - 160, cy - 55, 320, 110);
    panelG.lineStyle(0.5, 0x4a3890, 0.4); panelG.strokeRect(cx - 158, cy - 53, 316, 106);

    // Elo animado no fragmento
    const eloG = this.add.graphics().setScrollFactor(0).setDepth(51);
    let eloT = 0;
    const eloTimer = this.time.addEvent({ delay: 50, loop: true, callback: () => {
      eloT += 0.08;
      const ex = cx - 130 + Math.sin(eloT) * 3, ey = cy - 30 + Math.cos(eloT * 0.8) * 3;
      eloG.clear();
      eloG.fillStyle(0x8090d0, 0.08); eloG.fillCircle(ex, ey, 14);
      eloG.fillStyle(0xb0c0f0, 0.15); eloG.fillCircle(ex, ey, 7);
      eloG.fillStyle(0xdde8ff, 0.7); eloG.fillCircle(ex, ey, 2);
      eloG.fillStyle(0xffffff, 0.9); eloG.fillRect(Math.round(ex)-1, Math.round(ey)-1, 2, 2);
    }});

    // Speaker
    this.add.text(cx - 140, cy - 46, `— ${frag.speaker} —`, {
      fontFamily: 'monospace', fontSize: '5px', color: frag.color, letterSpacing: 2
    }).setScrollFactor(0).setDepth(51);

    // Texto do fragmento
    this.add.text(cx - 100, cy - 32, frag.text, {
      fontFamily: 'monospace', fontSize: '6px', color: '#8890b8',
      wordWrap: { width: 266 }, lineSpacing: 4, align: 'left',
    }).setScrollFactor(0).setDepth(51);

    // Continuar
    const continueHint = this.add.text(cx, cy + 44, '[ ENTER ]  continuar', {
      fontFamily: 'monospace', fontSize: '5px', color: '#2a2848'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(51);
    this.tweens.add({ targets: continueHint, alpha: { from: 0.4, to: 1 }, duration: 700, yoyo: true, repeat: -1 });

    const close = () => {
      eloTimer.destroy();
      eloG.destroy();
      panelG.destroy();
      continueHint.destroy();
      this.input.keyboard.off('keydown-ENTER', close);
      this.input.keyboard.off('keydown-SPACE', close);
      this.input.keyboard.off('keydown-Z', close);
      if (callback) callback();
    };

    this.input.keyboard.once('keydown-ENTER', close);
    this.input.keyboard.once('keydown-SPACE', close);
    this.input.keyboard.once('keydown-Z', close);
    this.input.once('pointerdown', close);
  }

  _offerRelic() {
    const RELICS = [
      { id:'iron_nerve', name:'Confiança Maior', desc:'Janela de confiança +80ms', img:'relic_iron_nerve',
        apply() { Run.buffs.parryBonus = (Run.buffs.parryBonus || 0) + 80; } },
      { id:'blood_fw', name:'Eco de Elo', desc:'Confiar cura 4 de Vontade', img:'relic_blood_fw', apply() {} },
      { id:'overclock', name:'Eco de Raiva', desc:'Dano +40%  Vontade máx -20%', img:'relic_overclock',
        apply() { Run.buffs.dmgMult = (Run.buffs.dmgMult || 1) * 1.4; Run.maxHp = Math.max(20, Math.floor(Run.maxHp * 0.8)); Run.hp = Math.min(Run.hp, Run.maxHp); } },
      { id:'scrap_marrow', name:'Memória Acumulada', desc:'+3 lembranças por fragmento dissolvido', img:'relic_scrap_marrow', apply() {} },
      { id:'phantom_limb', name:'Sombra de Mim', desc:'Desviar → próximo golpe 2x', img:'relic_phantom_limb', apply() {} },
      { id:'dogma_shard', name:'Calendário Riscado', desc:'5 fragmentos dissolvidos = +10 Vontade', img:'relic_dogma_shard', apply() {} },
      // ── NOVOS ITENS ───────────────────────────────────────────────────────
      { id:'flame_heart', name:'Grito Engolido', desc:'Acertos críticos ecoam (+30% dano)', img:'relic_flame_heart', apply() {} },
      { id:'echo_shield', name:'Ficar Perto É Suficiente', desc:'Sobrevive 1x com 15% de Vontade', img:'relic_echo_shield',
        apply() { Run._shieldUsed = false; } },
      { id:'shadow_mantle', name:'Olhar Pra Trás', desc:'Energia -50% ao confiar/desviar', img:'relic_shadow_mantle', apply() {} },
    ];

    const choices = [...RELICS].sort(() => Math.random() - 0.5).slice(0, 3).filter(r => !Run.relics.find(x => x.id === r.id));
    if (!choices.length) return;

    const panelG = this.add.graphics().setScrollFactor(0);
    const cx = W / 2, cy = H / 2;
    panelG.fillStyle(0x000000, 0.85); panelG.fillRect(0, 0, W, H);
    panelG.fillStyle(0x080610, 0.97); panelG.fillRect(cx - 130, cy - 50, 260, 100);
    panelG.lineStyle(0.5, 0x6b3a1a); panelG.strokeRect(cx - 130, cy - 50, 260, 100);
    panelG.lineStyle(0.5, 0xc8a030, 0.3); panelG.strokeRect(cx - 128, cy - 48, 256, 96);

    this.add.text(cx, cy - 40, 'FRAGMENTO DE MEMÓRIA', {
      fontFamily: 'monospace', fontSize: '7px', color: '#aa8855', letterSpacing: 2
    }).setOrigin(0.5).setScrollFactor(0);
    this.add.text(cx, cy - 30, 'escolha um para carregar', {
      fontFamily: 'monospace', fontSize: '5px', color: '#3a2818'
    }).setOrigin(0.5).setScrollFactor(0);

    const btns = [];
    choices.forEach((r, i) => {
      const bx = cx - 84 + i * 84; const by = cy;
      const bg = this.add.graphics().setScrollFactor(0);
      bg.fillStyle(0x0e0c14, 0.9); bg.fillRect(bx - 36, by - 20, 72, 42);
      bg.lineStyle(0.5, 0x2a2030); bg.strokeRect(bx - 36, by - 20, 72, 42);

      this.add.image(bx - 22, by - 6, 'relic_frame').setScrollFactor(0);
      this.add.image(bx - 22, by - 6, r.img).setScrollFactor(0);
      this.add.text(bx - 5, by - 18, r.name, {
        fontFamily: 'monospace', fontSize: '5px', color: '#c8a87a', wordWrap: { width: 72 }
      }).setScrollFactor(0);
      this.add.text(bx - 5, by - 8, r.desc, {
        fontFamily: 'monospace', fontSize: '4px', color: '#5a6070', wordWrap: { width: 72 }
      }).setScrollFactor(0);
      this.add.text(bx, by + 16, `[ ${i + 1} ]`, {
        fontFamily: 'monospace', fontSize: '5px', color: '#3a2818'
      }).setOrigin(0.5).setScrollFactor(0);

      const zone = this.add.zone(bx, by, 72, 42).setInteractive().setScrollFactor(0);
      zone.on('pointerover', () => { bg.clear(); bg.fillStyle(0x1a1828, 0.9); bg.fillRect(bx - 36, by - 20, 72, 42); bg.lineStyle(0.5, 0x6b3a1a); bg.strokeRect(bx - 36, by - 20, 72, 42); });
      zone.on('pointerout', () => { bg.clear(); bg.fillStyle(0x0e0c14, 0.9); bg.fillRect(bx - 36, by - 20, 72, 42); bg.lineStyle(0.5, 0x2a2030); bg.strokeRect(bx - 36, by - 20, 72, 42); });
      zone.on('pointerdown', () => pick(r));
      btns.push(zone);
    });

    const pick = (r) => {
      Run.relics.push(r); r.apply();
      Bus.emit('relic:picked', r);
      SFX.play('relic');
      panelG.destroy();
      btns.forEach(b => b.destroy());
      this.input.keyboard.off('keydown-ONE'); this.input.keyboard.off('keydown-TWO'); this.input.keyboard.off('keydown-THREE');
    };

    this.input.keyboard.once('keydown-ONE', () => choices[0] && pick(choices[0]));
    this.input.keyboard.once('keydown-TWO', () => choices[1] && pick(choices[1]));
    this.input.keyboard.once('keydown-THREE', () => choices[2] && pick(choices[2]));
  }

  _spawnPickup(x, y, type) {
    const p = this.add.image(x, y, `pickup_${type}`);
    this.physics.world.enable(p);
    p.body.setGravityY(180); p.body.setCollideWorldBounds(true);
    this.physics.add.collider(p, this.platforms);
    // Bobbing tween
    this.tweens.add({ targets: p, y: y - 4, duration: 600, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.pickups.push({ sprite: p, type });
  }

  _updatePickups() {
    this.pickups = this.pickups.filter(p => {
      if (!p.sprite.active) return false;
      const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, p.sprite.x, p.sprite.y);
      if (dist < 16) {
        const scrapBonus = Run.relics.find(r => r.id === 'scrap_marrow') ? 3 : 0;
        if (p.type === 'hp') Run.heal(8);
        else if (p.type === 'stamina') { Run.stamina = Math.min(Run.maxStamina, Run.stamina + 30); Bus.emit('stamina:change', Run.stamina); }
        else Run.addScrap(8 + scrapBonus);
        this._spawnNumber(p.sprite.x, p.sprite.y - 8, p.type === 'hp' ? '+8 HP' : p.type === 'stamina' ? '+30 STA' : `+${8 + scrapBonus}`, p.type === 'hp' ? '#44ee66' : p.type === 'stamina' ? '#6080e0' : '#c8a030');
        SFX.play('pickup');
        p.sprite.destroy(); return false;
      }
      return true;
    });
  }

  _checkExitOverlap() {
    if (!this.cleared) return;
    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this._roomW - 18, H / 2);
    if (dist < 32) {
      this.cleared = false;
      this.cameras.main.fade(300, 0, 0, 0);
      this.time.delayedCall(300, () => {
        const nextSeed = (this.seed * 31 + 7) % 0xFFFFFF;
        this.scene.start('Room', { seed: nextSeed, depth: this.depth + 1 });
      });
    }
  }

  _drawEnemyHp(e) {
    e.hpBar.clear();
    const pct = Math.max(0, e.hp / e.maxHp);
    if (e.isBoss) {
      // Boss HP bar is rendered in UI (scrollFactor 0)
      const barW = 158;
      e.hpBar.fillStyle(0xcc2020); e.hpBar.fillRect(W / 2 - barW / 2, H - 12, barW * pct, 5);
      e.hpBar.setScrollFactor(0);
      e.hpBar.setPosition(0, 0);
    } else {
      const w = 24;
      e.hpBar.fillStyle(0x1a0a0a, 0.8); e.hpBar.fillRect(-w / 2, -24, w, 3);
      const col = pct > 0.5 ? 0x44bb44 : pct > 0.25 ? 0xddaa22 : 0xcc2222;
      e.hpBar.fillStyle(col); e.hpBar.fillRect(-w / 2, -24, w * pct, 3);
    }
  }

  _spawnNumber(x, y, txt, color = '#ff4444', big = false) {
    const t = this.add.text(x, y, String(txt), {
      fontFamily: 'monospace', fontSize: big ? '9px' : '7px', color,
      stroke: '#000', strokeThickness: 1
    }).setOrigin(0.5);
    this.tweens.add({
      targets: t, y: y - 24, alpha: 0, duration: 700,
      ease: 'Power2', onComplete: () => t.destroy()
    });
  }

  _spawnBlood(x, y, count = 4) {
    for (let i = 0; i < count; i++) {
      const b = this.add.image(x + (Math.random() - 0.5) * 10, y + (Math.random() - 0.5) * 6, 'particle_blood');
      const dx = (Math.random() - 0.5) * 28, dy = -Math.random() * 20 - 4;
      this.tweens.add({
        targets: b, x: b.x + dx, y: b.y + dy, alpha: 0,
        duration: 260 + Math.random() * 140, onComplete: () => b.destroy()
      });
    }
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  SCENE — GAME OVER
// ════════════════════════════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }

  create() {
    buildTextures(this);
    this.cameras.main.setBackgroundColor('#000000');
    this.cameras.main.resetFX();
    this.cameras.main.fadeIn(800, 0, 0, 0);

    const echos = Math.floor(Run.kills * 0.6 + Run.roomsCleared * 3 + (this.scene.get('Room')?.depth || Run.depth) * 1.5);
    Perm.echos += echos; Perm.save();

    const cx = W / 2, cy = H / 2;

    // Dripping blood header effect
    const gfx = this.add.graphics();
    gfx.fillStyle(0x330000, 0.9); gfx.fillRect(0, 0, W, 30);
    for (let i = 0; i < 12; i++) {
      const bx = 20 + i * 38;
      const bh = 8 + Math.random() * 20;
      gfx.fillStyle(0x550000); gfx.fillRect(bx, 0, 4, 30);
      gfx.fillStyle(0x8b0000); gfx.fillRect(bx, 25, 4, bh);
      // Drop
      gfx.fillStyle(0xcc1010, 0.6); gfx.fillCircle(bx + 2, 25 + bh, 3);
    }

    // Main text
    this.add.text(cx, cy - 54, 'OS OLHOS NÃO ABREM', {
      fontFamily: 'monospace', fontSize: '18px', color: '#8b0000',
      stroke: '#000', strokeThickness: 2, letterSpacing: 6
    }).setOrigin(0.5).setAlpha(0);

    this.add.text(cx, cy - 32, 'SOMNARA CONTINUA SONHANDO', {
      fontFamily: 'monospace', fontSize: '7px', color: '#330000', letterSpacing: 4
    }).setOrigin(0.5).setAlpha(0);

    // Divider
    gfx.lineStyle(0.5, 0x330000, 0.8);
    gfx.lineBetween(cx - 80, cy - 18, cx + 80, cy - 18);

    // Stats
    const stats = [
      [`CAMADAS ATRAVESSADAS`, Run.roomsCleared],
      [`FRAGMENTOS DISSOLVIDOS`, Run.kills],
      [`LEMBRANÇAS COLETADAS`, Run.scrap],
      [`ECOS OBTIDOS`, `+${echos}Ξ`],
    ];

    stats.forEach(([label, val], i) => {
      const t1 = this.add.text(cx - 70, cy - 10 + i * 14, label, {
        fontFamily: 'monospace', fontSize: '6px', color: '#331a1a'
      }).setAlpha(0);
      const t2 = this.add.text(cx + 70, cy - 10 + i * 14, String(val), {
        fontFamily: 'monospace', fontSize: '6px', color: i === 3 ? '#4060aa' : '#4a3030'
      }).setOrigin(1, 0).setAlpha(0);
      this.tweens.add({ targets: [t1, t2], alpha: 1, duration: 400, delay: 1000 + i * 200 });
    });

    // Relics summary
    if (Run.relics.length > 0) {
      this.add.text(cx, cy + 54, 'FRAGMENTOS CARREGADOS:', {
        fontFamily: 'monospace', fontSize: '5px', color: '#221010'
      }).setOrigin(0.5);
      Run.relics.forEach((r, i) => {
        this.add.image(cx - (Run.relics.length - 1) * 10 + i * 20, cy + 66, 'relic_frame');
        this.add.image(cx - (Run.relics.length - 1) * 10 + i * 20, cy + 66, r.img);
      });
    }

    // Citacao de lore — fragmento aleatorio da narrativa de Somnara
    const LORE_QUOTES = [
      '"Lugares como esse nao deixam voce ir embora tao facil."',
      '"Fugir nao apaga. Transforma."',
      '"O peso que voce carrega nao vai sumir aqui."',
      '"Somnara estava absorvendo o que voce trouxe."',
      '"As sombras do lado de fora comecam a vazar pelas frestas."',
      '"Voce havia chegado cheio de feridas que ainda sangravam."',
      '"Talvez, aqui, voce consiga finalmente olhar pra ele."',
      '"Elo nao foge."',
    ];
    const q = LORE_QUOTES[Math.floor(Math.random() * LORE_QUOTES.length)];
    this.add.text(cx, cy + 56, q, {
      fontFamily: 'monospace', fontSize: '5px', color: '#1a1428',
      align: 'center', wordWrap: { width: W - 60 }, lineSpacing: 4,
      fontStyle: 'italic',
    }).setOrigin(0.5).setAlpha(0);

    // Return prompt
    const prompt = this.add.text(cx, cy + 90, '[ ENTER ]  VOLTAR AO LIMIAR', {
      fontFamily: 'monospace', fontSize: '6px', color: '#221018', letterSpacing: 1
    }).setOrigin(0.5).setAlpha(0);

    this.tweens.add({ targets: prompt, alpha: { from: 0.2, to: 0.7 }, duration: 900, yoyo: true, repeat: -1, delay: 2000 });

    // Fade-in elements
    this.children.list.forEach(child => {
      if (child !== gfx && child.alpha === 0)
        this.tweens.add({ targets: child, alpha: 1, duration: 500, delay: 600 });
    });

    this.input.keyboard.once('keydown-ENTER', () => this._back());
    this.input.keyboard.once('keydown-SPACE', () => this._back());
    this.input.on('pointerdown', () => this._back());
  }

  _back() {
    this.cameras.main.fade(400, 0, 0, 0);
    this.time.delayedCall(400, () => { this.scene.stop('UI'); this.scene.start('Hub'); });
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  SCENE — UI (HUD overlay)
// ════════════════════════════════════════════════════════════════════════════
class UIScene extends Phaser.Scene {
  constructor() { super({ key: 'UI', active: false }); }

  create() {
    buildTextures(this);
    this._hpGfx = this.add.graphics();
    this._staminaGfx = this.add.graphics();

    // HP label
    this.add.text(8, 8, 'VONTADE', { fontFamily: 'monospace', fontSize: '5px', color: '#2a1520' });

    // Scrap icon + text
    this.add.image(10, 37, 'ui_scrap').setScale(0.8);
    this._scrapTxt = this.add.text(22, 32, '0', { fontFamily: 'monospace', fontSize: '9px', color: '#c8a030' });

    // Echo icon + text
    this.add.image(W - 16, 8, 'ui_echo').setScale(0.8).setOrigin(1, 0);
    this._echoTxt = this.add.text(W - 6, 8, '0Ξ', { fontFamily: 'monospace', fontSize: '8px', color: '#4060aa' }).setOrigin(1, 0);

    // HP text (current/max)
    this._hpTxt = this.add.text(10, 20, '', { fontFamily: 'monospace', fontSize: '5px', color: '#441020' });

    // Relic slots
    this._relicSlots = [];
    for (let i = 0; i < 6; i++) {
      const slot = this.add.image(W - 6 - i * 20, H - 6, 'relic_frame').setOrigin(1, 1);
      this._relicSlots.push({ frame: slot, icon: null });
    }

    // Controls hint
    const isTouch = document.body.classList.contains('is-touch');
    this._hint = this.add.text(W / 2, H - 6, isTouch ? 'AGIR · CONFIAR · DESVIAR' : 'Z AGIR  ·  X CONFIAR  ·  C DESVIAR', {
      fontFamily: 'monospace', fontSize: '4px', color: '#0e0c14', align: 'center'
    }).setOrigin(0.5, 1);

    // Depth counter
    this._depthTxt = this.add.text(W / 2, 6, '', { fontFamily: 'monospace', fontSize: '5px', color: '#0a0810' }).setOrigin(0.5, 0);

    // Mensagem de Elo no inicio do sonho
    this._eloMsg = this.add.text(W / 2, H / 2 - 20, '', {
      fontFamily: 'monospace', fontSize: '6px', color: '#3a4070',
      align: 'center', wordWrap: { width: W - 40 }
    }).setOrigin(0.5).setAlpha(0).setDepth(10);

    this._refresh();

    Bus.on(EV.HIT, () => this._refresh(), this);
    Bus.on(EV.HEAL, () => this._refresh(), this);
    Bus.on(EV.SCRAP, () => this._refresh(), this);
    Bus.on(EV.ENEMY_DEATH, () => this._refresh(), this);
    Bus.on('relic:picked', () => this._refreshRelics(), this);
    Bus.on('run:hub', () => this._refresh(), this);

    // Mensagem de Elo nas primeiras camadas
    const ELO_MSGS = [
      'Elo apareceu do nada.\nNao fugiu.',
      'Elo fica perto.\nNao precisa de mais nada.',
      'O peso que voce trouxe\npode ser olhado aqui.',
      'Somnara lembra\no que voce esqueceu.',
    ];
    Bus.on('room:start', (depth) => {
      if (depth < 4 && this._eloMsg) {
        const msg = ELO_MSGS[depth % ELO_MSGS.length];
        this._eloMsg.setText(msg).setAlpha(0);
        this.tweens.add({ targets: this._eloMsg, alpha: 0.55, duration: 800, delay: 600 });
        this.time.delayedCall(3500, () => {
          if (this._eloMsg) this.tweens.add({ targets: this._eloMsg, alpha: 0, duration: 600 });
        });
      }
    }, this);
  }

  _refresh() {
    // HP bar
    this._hpGfx.clear();
    const pct = Run.hp / Run.maxHp;
    const bw = 82, bh = 7, bx = 8, by = 14;
    this._hpGfx.fillStyle(0x0a0810, 0.9); this._hpGfx.fillRect(bx, by, bw, bh);
    // HP fill with gradient-like effect
    const col = pct > 0.6 ? 0xaa2233 : pct > 0.3 ? 0xcc4422 : 0xee1111;
    this._hpGfx.fillStyle(col);
    this._hpGfx.fillRect(bx + 1, by + 1, Math.round((bw - 2) * pct), bh - 2);
    // Segmented overlay
    this._hpGfx.lineStyle(0.3, 0x050408, 0.8);
    for (let i = 1; i < 10; i++) this._hpGfx.lineBetween(bx + i * 8, by, bx + i * 8, by + bh);
    this._hpGfx.lineStyle(0.5, 0x3a1020); this._hpGfx.strokeRect(bx, by, bw, bh);

    this._hpTxt.setText(`${Run.hp} / ${Run.maxHp}`);
    this._scrapTxt.setText(String(Run.scrap));
    this._echoTxt.setText(`${Perm.echos}Ξ`);
    this._depthTxt.setText(Run.depth > 0 ? `SETOR ${Run.depth}` : '');
  }

  _refreshRelics() {
    Run.relics.forEach((r, i) => {
      if (this._relicSlots[i]) {
        if (this._relicSlots[i].icon) this._relicSlots[i].icon.destroy();
        const x = W - 6 - i * 20, y = H - 6;
        this._relicSlots[i].icon = this.add.image(x, y, r.img).setOrigin(1, 1);
      }
    });
    this._refresh();
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  PHASER GAME CONFIG
// ════════════════════════════════════════════════════════════════════════════
const game = new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  zoom: SCALE,
  backgroundColor: '#000000',
  parent: 'game-container',
  pixelArt: true,
  roundPixels: true,
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 0 }, debug: false }
  },
  scene: [BootScene, IntroScene, HubScene, RoomScene, GameOverScene, UIScene],
});
</script>
</body>
</html>
